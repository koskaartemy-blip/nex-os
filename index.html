<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NEON CORE • Ultimate Console v10.1</title>
  <style>
    :root {
      --bg: #010108;
      --surface: #080420;
      --surface2: #0f0830;
      --border: #1a1240;
      --border2: #2d2058;
      --text: #4a3870;
      --text2: #6b52a0;
      --text3: #8b6fc8;
      --accent: #ff006e;
      --accent2: #8338ec;
      --accent3: #3a86ff;
      --accent4: #00ff88;
      --accent5: #ffbe0b;
      --accent6: #ff6b35;
      --accent-dim: #0a0020;
      --glow: rgba(255,0,110,0.12);
      --glow2: rgba(131,56,236,0.18);
      --glow3: rgba(58,134,255,0.15);
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { height:100%; touch-action:manipulation; -webkit-overflow-scrolling:touch; }
    body {
      background: var(--bg);
      font-family: 'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif;
      height:100%; width:100%;
      overflow:hidden; user-select:none; -webkit-user-select:none;
      -webkit-tap-highlight-color:transparent; touch-action:manipulation;
      -webkit-font-smoothing:antialiased; position:fixed; top:0; left:0;
    }
    .console { width:100%; height:100%; display:flex; flex-direction:column; position:relative; overflow:hidden; }

    /* BOOT SCREEN */
    .boot-screen {
      position:absolute; inset:0; background:#000; z-index:5000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:all 1s cubic-bezier(0.16,1,0.3,1); gap:20px;
    }
    .boot-screen.hidden { opacity:0; pointer-events:none; filter:blur(30px); transform:scale(1.15); }
    .boot-icon {
      width:60px; height:60px; border:2px solid var(--accent); border-radius:16px;
      display:flex; align-items:center; justify-content:center; font-size:28px;
      animation:bootPulse 1.2s ease-in-out infinite;
      box-shadow:0 0 40px var(--glow);
    }
    @keyframes bootPulse {
      0%,100% { box-shadow:0 0 40px var(--glow); transform:scale(1); }
      50% { box-shadow:0 0 80px var(--glow2); transform:scale(1.08); }
    }
    .boot-text {
      font-size:22px; font-weight:900; letter-spacing:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3),var(--accent4));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .boot-ring {
      width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--accent);
      border-radius:50%; animation:bootSpin 0.8s linear infinite;
    }
    @keyframes bootSpin { to{transform:rotate(360deg);} }

    /* LOGIN SCREEN */
    .login-screen {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at center,var(--surface) 0%,#000 70%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:3000; transition:all 0.6s; gap:8px;
    }
    .login-screen.hidden { opacity:0; pointer-events:none; filter:blur(15px); transform:scale(1.06); }
    .login-card {
      position:relative; z-index:2;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:24px; display:flex; flex-direction:column;
      align-items:center; gap:20px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
      max-width:85vw; width:320px;
    }
    .login-avatar {
      width:70px; height:70px; border-radius:50%; border:2px solid var(--accent);
      display:flex; align-items:center; justify-content:center; font-size:32px;
      box-shadow:0 0 40px var(--glow);
    }
    .login-greeting { color:var(--text3); font-size:12px; font-weight:600; letter-spacing:3px; }
    .login-users { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
    .login-user-pill {
      padding:8px 14px; border:1px solid var(--border); border-radius:20px;
      color:var(--text); font-size:10px; letter-spacing:1px; cursor:pointer;
      transition:all 0.25s; background:var(--surface2); display:flex;
      align-items:center; gap:6px; -webkit-tap-highlight-color:transparent;
    }
    .login-user-pill:active { transform:scale(0.95); }
    .login-user-pill.active { border-color:var(--accent); color:var(--accent); box-shadow:0 0 20px var(--glow); }
    .login-enter {
      padding:10px 28px; border:none; border-radius:24px;
      background:var(--accent); color:#fff; font-family:inherit; font-size:11px;
      font-weight:700; letter-spacing:3px; cursor:pointer; transition:0.2s;
      text-transform:uppercase; -webkit-tap-highlight-color:transparent;
    }
    .login-enter:active { transform:scale(0.95); }
    .login-hint {
      position:absolute; bottom:30px; color:var(--border); font-size:8px;
      letter-spacing:2px; animation:hintPulse 3s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:0.12;} 50%{opacity:0.5;} }

    /* HEADER */
    .header {
      display:flex; justify-content:space-between; align-items:center;
      padding:6px 12px; height:44px; border-bottom:1px solid var(--border);
      background:rgba(8,4,32,0.9); backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px); z-index:100; flex-shrink:0;
    }
    .header-left { display:flex; align-items:center; gap:8px; }
    .header-logo-icon {
      width:28px; height:28px; border-radius:8px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:14px;
    }
    .header-logo-text {
      font-size:10px; font-weight:800; letter-spacing:3px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-tabs { display:flex; gap:2px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .header-tab {
      padding:5px 10px; border:1px solid transparent; border-radius:14px;
      color:var(--text); font-size:8px; letter-spacing:1px; cursor:pointer;
      transition:0.2s; text-transform:uppercase; background:transparent;
      font-family:inherit; font-weight:500; white-space:nowrap; flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .header-tab:active { transform:scale(0.95); }
    .header-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(255,0,110,0.06); }

    /* CONTENT */
    .content { flex:1; display:flex; overflow:hidden; position:relative; }

    /* SIDEBAR */
    .sidebar {
      width:48px; border-right:1px solid var(--border);
      display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:2px;
      background:var(--surface); flex-shrink:0;
    }
    .sidebar-item {
      width:36px; height:36px; display:flex; align-items:center; justify-content:center;
      font-size:14px; color:var(--text); cursor:pointer; transition:0.2s;
      border-radius:10px; opacity:0.35; position:relative;
      -webkit-tap-highlight-color:transparent;
    }
    .sidebar-item:active { opacity:0.7; }
    .sidebar-item.active { opacity:1; color:var(--accent); background:var(--accent-dim); }

    /* MAIN */
    .main {
      flex:1; display:flex; flex-direction:column; padding:12px 14px; gap:10px;
      overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
    }
    .main-title { color:var(--text3); font-size:12px; font-weight:700; letter-spacing:2px; }
    .game-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
    .game-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:14px; cursor:pointer; transition:all 0.3s; position:relative;
      overflow:hidden; display:flex; flex-direction:column;
      -webkit-tap-highlight-color:transparent;
    }
    .game-card:active { transform:scale(0.97); }
    .game-card-icon { font-size:32px; margin-bottom:6px; position:relative; z-index:1; }
    .game-card-title { color:var(--text3); font-size:13px; font-weight:700; letter-spacing:1px; margin-bottom:4px; }
    .game-card-desc { color:var(--text); font-size:8px; line-height:1.4; flex:1; }
    .game-card-badge {
      font-size:7px; font-weight:700; letter-spacing:1px; padding:3px 8px;
      border-radius:8px; display:inline-block; margin-bottom:4px;
    }
    .game-card-badge.puzzle { background:var(--accent6); color:#fff; }
    .game-card-badge.fnf { background:var(--accent); color:#fff; }
    .game-card-badge.action3d { background:var(--accent2); color:#fff; }
    .game-card-play {
      margin-top:8px; padding:7px 16px; border:1px solid var(--accent); border-radius:14px;
      background:transparent; color:var(--accent); font-family:inherit;
      font-size:9px; font-weight:600; letter-spacing:2px; cursor:pointer;
      transition:0.2s; -webkit-tap-highlight-color:transparent; width:fit-content;
    }
    .game-card-play:active { background:var(--accent); color:#fff; }

    /* MOBILE NAV */
    .mobile-nav {
      display:none; height:56px; border-top:1px solid var(--border);
      background:rgba(8,4,32,0.9); backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px); padding-bottom:var(--safe-bottom);
      flex-shrink:0; z-index:100;
    }
    .mobile-nav-inner { display:flex; height:100%; align-items:center; justify-content:space-around; }
    .mobile-nav-item {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      color:var(--text); font-size:16px; cursor:pointer; transition:0.2s; opacity:0.4;
      padding:4px 12px; border-radius:10px; -webkit-tap-highlight-color:transparent;
    }
    .mobile-nav-item:active { opacity:0.7; }
    .mobile-nav-item.active { opacity:1; color:var(--accent); }
    .mobile-nav-label { font-size:7px; letter-spacing:1px; }

    /* GAME OVERLAY */
    .game-overlay {
      position:fixed; inset:0; z-index:2000; background:var(--bg);
      display:none; flex-direction:column; align-items:center; justify-content:center;
    }
    .game-overlay.active { display:flex; }
    .game-stage {
      position:relative; border:1px solid var(--border2);
      box-shadow:0 0 80px var(--glow2); border-radius:12px; overflow:hidden;
      max-width:96vw; max-height:75vh; display:flex; align-items:center; justify-content:center;
    }
    .game-stage canvas { display:block; width:100%; height:100%; object-fit:contain; }
    .game-hud {
      position:absolute; top:0; left:0; right:0; display:flex;
      justify-content:space-between; padding:10px 14px; pointer-events:none; z-index:5;
    }
    .game-hud-text {
      color:#fff; font-size:10px; font-weight:700; letter-spacing:2px;
      text-shadow:0 0 12px var(--accent); background:rgba(0,0,0,0.5);
      padding:4px 10px; border-radius:8px;
    }
    .game-back-btn {
      position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
      padding:10px 22px; border:1px solid var(--accent); border-radius:20px;
      background:rgba(0,0,0,0.85); color:var(--accent); font-family:inherit;
      font-size:10px; font-weight:600; letter-spacing:2px; cursor:pointer;
      transition:0.2s; z-index:15; -webkit-tap-highlight-color:transparent;
    }
    .game-back-btn:active { background:var(--accent); color:#000; }
    .mobile-controls {
      display:none; position:absolute; bottom:60px; left:0; right:0;
      justify-content:center; gap:30px; z-index:10;
    }
    .mobile-ctrl-btn {
      width:56px; height:56px; border-radius:50%; border:2px solid rgba(255,255,255,0.4);
      background:rgba(0,0,0,0.6); color:#fff; font-size:22px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      -webkit-tap-highlight-color:transparent; touch-action:manipulation;
      user-select:none; -webkit-user-select:none;
    }
    .mobile-ctrl-btn:active { background:rgba(255,0,110,0.5); border-color:var(--accent); transform:scale(0.9); }

    /* FNF OVERLAY */
    .fnf-overlay {
      position:fixed; inset:0; z-index:2000; background:#030105;
      display:none; flex-direction:column; align-items:center; justify-content:center;
    }
    .fnf-overlay.active { display:flex; }
    .fnf-stage {
      position:relative; width:min(900px,96vw); height:min(550px,65vh);
      border:1px solid var(--border2); box-shadow:0 0 100px var(--glow2);
      overflow:hidden; border-radius:12px;
    }
    .fnf-canvas { display:block; width:100%; height:100%; }
    .fnf-hud {
      position:absolute; top:0; left:0; right:0; display:flex;
      justify-content:space-between; padding:10px 14px; pointer-events:none; z-index:5;
    }
    .fnf-hp { width:35vw; max-width:140px; height:6px; background:#1a1018; border-radius:3px; overflow:hidden; }
    .fnf-hp-fill { height:100%; transition:width 0.2s; border-radius:3px; }
    .fnf-hp-left .fnf-hp-fill { background:linear-gradient(90deg,var(--accent),#ff3386); }
    .fnf-hp-right .fnf-hp-fill { background:linear-gradient(90deg,#ff3386,var(--accent)); }
    .fnf-score { text-align:center; color:#fff; font-size:12px; font-weight:700; letter-spacing:2px; text-shadow:0 0 14px var(--accent); }
    .fnf-combo { text-align:center; color:var(--accent5); font-size:9px; font-weight:700; }
    .fnf-instructions {
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      color:var(--text); font-size:7px; letter-spacing:2px; pointer-events:none;
    }
    .fnf-level-select {
      position:absolute; inset:0; background:rgba(3,1,5,0.96);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; z-index:10;
    }
    .fnf-level-title {
      font-size:min(24px,5vw); font-weight:900; letter-spacing:4px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .fnf-level-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 12px; width:100%; max-width:400px; }
    .fnf-level-btn {
      padding:12px 14px; border:1px solid var(--border2); border-radius:10px;
      background:var(--surface); color:var(--text2); font-family:inherit;
      font-size:9px; font-weight:700; letter-spacing:2px; cursor:pointer;
      transition:0.2s; -webkit-tap-highlight-color:transparent;
    }
    .fnf-level-btn:active { border-color:var(--accent); color:var(--accent); }
    .fnf-level-btn.locked { opacity:0.3; pointer-events:none; }
    .fnf-result {
      position:absolute; inset:0; background:rgba(3,1,5,0.96);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; z-index:10;
    }
    .fnf-result-title { font-size:20px; font-weight:900; letter-spacing:3px; }
    .fnf-result-title.win { color:var(--accent4); }
    .fnf-result-title.lose { color:var(--accent); }
    .fnf-result-btn {
      padding:8px 18px; border:1px solid var(--accent); border-radius:16px;
      background:transparent; color:var(--accent); font-family:inherit;
      font-size:9px; font-weight:600; letter-spacing:2px; cursor:pointer;
      transition:0.2s; -webkit-tap-highlight-color:transparent;
    }
    .fnf-result-btn:active { background:var(--accent); color:#fff; }
    .fnf-back-btn {
      position:absolute; bottom:10px; right:12px;
      padding:7px 14px; border:1px solid var(--accent); border-radius:16px;
      background:rgba(0,0,0,0.7); color:var(--accent); font-family:inherit;
      font-size:8px; font-weight:600; letter-spacing:2px; cursor:pointer;
      transition:0.2s; z-index:20; -webkit-tap-highlight-color:transparent;
    }
    .fnf-back-btn:active { background:var(--accent); color:#000; }
    .fnf-mobile-lanes {
      display:none; position:absolute; bottom:45px; left:0; right:0;
      justify-content:center; gap:6px; z-index:10;
    }
    .fnf-mobile-btn {
      width:48px; height:64px; border:2px solid rgba(255,255,255,0.3); border-radius:10px;
      background:rgba(0,0,0,0.55); color:#fff; font-size:22px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      -webkit-tap-highlight-color:transparent; touch-action:manipulation;
      user-select:none; -webkit-user-select:none;
    }
    .fnf-mobile-btn:active { background:rgba(255,0,110,0.5); border-color:var(--accent); transform:scale(0.9); }

    /* TOASTS */
    .toast-container {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column-reverse; gap:5px; z-index:6000;
      pointer-events:none;
    }
    .toast {
      padding:7px 18px; background:rgba(8,4,32,0.95); border:1px solid var(--accent);
      color:var(--accent); font-size:8px; font-weight:600; letter-spacing:2px;
      border-radius:8px; opacity:0; transform:translateY(8px); transition:0.3s;
      backdrop-filter:blur(10px); text-transform:uppercase; text-align:center;
    }
    .toast.show { opacity:1; transform:translateY(0); }

    @media(max-width:768px) {
      .sidebar { display:none; }
      .mobile-nav { display:block; }
      .header-logo-text { display:none; }
      .game-grid { grid-template-columns:1fr; }
      .game-card { padding:12px; }
      .main { padding:10px 12px; }
      .fnf-stage { height:60vh; }
      .fnf-mobile-lanes { display:flex; }
      .mobile-controls { display:flex; }
    }
    @media(min-width:769px) {
      .mobile-nav { display:none; }
      .mobile-controls { display:none; }
      .fnf-mobile-lanes { display:none; }
    }
  </style>
</head>
<body>
  <div class="console" id="consoleApp">
    <!-- BOOT -->
    <div class="boot-screen" id="bootScreen">
      <div class="boot-icon">⬡</div>
      <div class="boot-text">NEON CORE</div>
      <div class="boot-ring"></div>
    </div>

    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
      <div class="login-card">
        <div class="login-avatar" id="loginAvatar">⚡</div>
        <div class="login-greeting">WELCOME BACK</div>
        <div class="login-users" id="avatarList">
          <button class="login-user-pill active" data-user="0">⚡ CYPHER</button>
          <button class="login-user-pill" data-user="1">💀 GHOST</button>
          <button class="login-user-pill" data-user="2">👁 VOID</button>
        </div>
        <button class="login-enter" id="loginEnter">ENTER SYSTEM</button>
      </div>
      <div class="login-hint">TAP OR PRESS ENTER</div>
    </div>

    <!-- FNF OVERLAY -->
    <div class="fnf-overlay" id="fnfOverlay">
      <div class="fnf-stage" id="fnfStage">
        <canvas class="fnf-canvas" id="fnfCanvas"></canvas>
        <div class="fnf-hud">
          <div class="fnf-hp fnf-hp-left"><div class="fnf-hp-fill" id="fnfHpL" style="width:100%"></div></div>
          <div><div class="fnf-score" id="fnfScoreDisp">0</div><div class="fnf-combo" id="fnfComboDisp"></div></div>
          <div class="fnf-hp fnf-hp-right"><div class="fnf-hp-fill" id="fnfHpR" style="width:100%"></div></div>
        </div>
        <div class="fnf-instructions" id="fnfInstr"></div>
        <div class="fnf-level-select" id="fnfLvlSel"><div class="fnf-level-title">FRIDAY NIGHT FUNKIN'</div><div class="fnf-level-grid" id="fnfLvlGrid"></div></div>
        <div class="fnf-result" id="fnfResult" style="display:none"><div class="fnf-result-title" id="fnfResTitle"></div><div style="color:var(--text2);font-size:10px;text-align:center;line-height:1.8" id="fnfResStats"></div><button class="fnf-result-btn" id="fnfRetry">RETRY</button><button class="fnf-result-btn" id="fnfNext">NEXT</button></div>
        <div class="fnf-mobile-lanes" id="fnfMobileLanes"></div>
        <button class="fnf-back-btn" id="fnfBack">✕ EXIT</button>
      </div>
    </div>

    <!-- GAME OVERLAY -->
    <div class="game-overlay" id="gameOverlay">
      <div class="game-stage" id="gameStage">
        <canvas id="gameCanvas"></canvas>
        <div class="game-hud"><span class="game-hud-text" id="gHudL"></span><span class="game-hud-text" id="gHudR"></span></div>
        <div class="mobile-controls" id="mobileControls">
          <button class="mobile-ctrl-btn" id="mBtnL">◀</button>
          <button class="mobile-ctrl-btn" id="mBtnR">▶</button>
        </div>
        <button class="game-back-btn" id="gameBack">✕ EXIT</button>
      </div>
    </div>

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <div class="header-logo-icon">⬡</div>
        <div class="header-logo-text">NEON CORE</div>
      </div>
      <div class="header-tabs" id="headerTabs">
        <button class="header-tab active" data-filter="all">ALL</button>
        <button class="header-tab" data-filter="fnf">🎤</button>
        <button class="header-tab" data-filter="blockblast">🧊</button>
        <button class="header-tab" data-filter="3d">🌐</button>
      </div>
    </div>

    <div class="content">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-item active">⌂</div>
        <div class="sidebar-item">🎮</div>
        <div class="sidebar-item">🧊</div>
        <div class="sidebar-item">🏆</div>
      </div>

      <div class="main">
        <div class="main-title">🎮 GAME LIBRARY</div>
        <div class="game-grid" id="gameGrid"></div>
      </div>
    </div>

    <!-- MOBILE NAV -->
    <div class="mobile-nav">
      <div class="mobile-nav-inner">
        <div class="mobile-nav-item active"><span>⌂</span><span class="mobile-nav-label">Home</span></div>
        <div class="mobile-nav-item"><span>🎮</span><span class="mobile-nav-label">Games</span></div>
        <div class="mobile-nav-item"><span>🧊</span><span class="mobile-nav-label">Blast</span></div>
        <div class="mobile-nav-item"><span>⚙</span><span class="mobile-nav-label">Settings</span></div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
  </div>

<script>
(()=>{
let audioCtx=null;
const ac=()=>{if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;};
const tone=(f,d=0.08,v=0.025,type='square')=>{try{const a=ac();const t=a.currentTime;const o=a.createOscillator();const g=a.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d);}catch(e){}};
const sfx={click:()=>tone(600,0.05,0.02),select:()=>{tone(800,0.07,0.022);setTimeout(()=>tone(1000,0.05,0.018),45);},launch:()=>{tone(400,0.12,0.028);setTimeout(()=>tone(800,0.1,0.025),90);},hit:p=>tone(440+p*110,0.08,0.03),miss:()=>tone(100,0.18,0.04,'sawtooth'),levelUp:()=>{tone(523,0.08,0.032);setTimeout(()=>tone(659,0.08,0.032),90);setTimeout(()=>tone(784,0.12,0.042),180);},gameOver:()=>{tone(200,0.25,0.04);setTimeout(()=>tone(100,0.4,0.035),180);},blockBreak:()=>{tone(800,0.06,0.025);setTimeout(()=>tone(1200,0.05,0.018),35);}};

const $=id=>document.getElementById(id);
const bootScreen=$('bootScreen'),loginScreen=$('loginScreen'),loginEnter=$('loginEnter'),loginAvatar=$('loginAvatar');
const fnfOverlay=$('fnfOverlay'),fnfCanvas=$('fnfCanvas'),fnfStage=$('fnfStage');
const fnfScoreDisp=$('fnfScoreDisp'),fnfComboDisp=$('fnfComboDisp'),fnfHpL=$('fnfHpL'),fnfHpR=$('fnfHpR'),fnfInstr=$('fnfInstr');
const fnfLvlSel=$('fnfLvlSel'),fnfLvlGrid=$('fnfLvlGrid'),fnfResult=$('fnfResult'),fnfResTitle=$('fnfResTitle'),fnfResStats=$('fnfResStats'),fnfRetry=$('fnfRetry'),fnfNext=$('fnfNext'),fnfBack=$('fnfBack'),fnfMobileLanes=$('fnfMobileLanes');
const gameOverlay=$('gameOverlay'),gameCanvas=$('gameCanvas'),gameStage=$('gameStage'),gHudL=$('gHudL'),gHudR=$('gHudR'),gameBack=$('gameBack'),mobileControls=$('mobileControls'),mBtnL=$('mBtnL'),mBtnR=$('mBtnR');
const gameGrid=$('gameGrid'),toastContainer=$('toastContainer');

const users=['CYPHER','GHOST','VOID'],userIcons=['⚡','💀','👁'];
let currentUser=0,booted=false,fnfCleanup=null,fnfLoopId=null,extCleanup=null,extLoopId=null;
const fnfUnlocked={1:true,2:true,3:false,4:false,5:false,6:false};

function showToast(msg){
const el=document.createElement('div');el.className='toast';el.textContent=msg;
toastContainer.appendChild(el);
requestAnimationFrame(()=>{el.classList.add('show');});
setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},1800);
}
function isMobile(){return window.innerWidth<=768;}

// ========== BLOCK BLAST ==========
function createBlockBlast(){
if(extCleanup){extCleanup();extCleanup=null;}
if(extLoopId){cancelAnimationFrame(extLoopId);extLoopId=null;}
gameOverlay.classList.add('active');
const canvas=gameCanvas;const ctx=canvas.getContext('2d');
const mob=isMobile();
const W=mob?Math.min(380,window.innerWidth-16):780;
const H=mob?Math.min(500,window.innerHeight-180):520;
canvas.width=W;canvas.height=H;
gameStage.style.width=W+'px';gameStage.style.height=H+'px';
if(mob){mobileControls.style.display='flex';}else{mobileControls.style.display='none';}

const COLS=9,ROWS=6;
const cellW=W/COLS,cellH=H*0.42/ROWS;
let grid=[];
for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++){grid[r][c]=Math.random()<0.6?Math.floor(Math.random()*3)+1:0;}}
let paddle={x:W/2-50,y:H-32,w:mob?80:100,h:9};
let ball={x:W/2,y:H-50,vx:2.2*(Math.random()>0.5?1:-1),vy:-3.2,r:6};
let score=0,combo=0,lives=3,gameOver=false,level=1,particles=[];
let keys={},mobileLeft=false,mobileRight=false;

const pressLeft=()=>{mobileLeft=true;};
const releaseLeft=()=>{mobileLeft=false;};
const pressRight=()=>{mobileRight=true;};
const releaseRight=()=>{mobileRight=false;};

mBtnL.addEventListener('pointerdown',pressLeft);
mBtnL.addEventListener('pointerup',releaseLeft);
mBtnL.addEventListener('pointerleave',releaseLeft);
mBtnL.addEventListener('pointercancel',releaseLeft);
mBtnL.addEventListener('touchstart',(e)=>{e.preventDefault();pressLeft();});
mBtnL.addEventListener('touchend',(e)=>{e.preventDefault();releaseLeft();});

mBtnR.addEventListener('pointerdown',pressRight);
mBtnR.addEventListener('pointerup',releaseRight);
mBtnR.addEventListener('pointerleave',releaseRight);
mBtnR.addEventListener('pointercancel',releaseRight);
mBtnR.addEventListener('touchstart',(e)=>{e.preventDefault();pressRight();});
mBtnR.addEventListener('touchend',(e)=>{e.preventDefault();releaseRight();});

const onKD=(e)=>{keys[e.key]=true;};
const onKU=(e)=>{keys[e.key]=false;};
document.addEventListener('keydown',onKD);
document.addEventListener('keyup',onKU);

function mkParticles(x,y,c){for(let i=0;i<5;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-2,life:1,color:c,size:1.5+Math.random()*3});}

function update(){
if(gameOver)return;
const spd=mob?4.5:6;
if(keys['ArrowLeft']||mobileLeft)paddle.x=Math.max(0,paddle.x-spd);
if(keys['ArrowRight']||mobileRight)paddle.x=Math.min(W-paddle.w,paddle.x+spd);
ball.x+=ball.vx;ball.y+=ball.vy;
if(ball.x-ball.r<0||ball.x+ball.r>W)ball.vx*=-1;
if(ball.y-ball.r<0)ball.vy*=-1;
if(ball.y+ball.r>paddle.y&&ball.y<paddle.y+paddle.h&&ball.x>paddle.x-5&&ball.x<paddle.x+paddle.w+5){
const hitPos=(ball.x-paddle.x)/paddle.w;
ball.vy=-Math.abs(ball.vy);
ball.vx=(hitPos-0.5)*7;
combo=0;
try{sfx.click();}catch(e){}
}
let hit=false;
for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){if(grid[r][c]===0)continue;
const bx=c*cellW+1,by=r*cellH+1,bw=cellW-2,bh=cellH-2;
if(ball.x+ball.r>bx&&ball.x-ball.r<bx+bw&&ball.y+ball.r>by&&ball.y-ball.r<by+bh){
grid[r][c]--;score+=100;combo++;if(combo>1)score+=combo*12;
try{sfx.blockBreak();}catch(e){}
mkParticles(bx+bw/2,by+bh/2,['#ff006e','#8338ec','#3a86ff'][Math.min(2,grid[r][c])]);
ball.vy*=-1;hit=true;break;
}}if(hit)break;}
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.035;});particles=particles.filter(p=>p.life>0);
if(ball.y+ball.r>H){lives--;combo=0;if(lives<=0){gameOver=true;try{sfx.gameOver();}catch(e){}}else{ball.x=W/2;ball.y=H-50;ball.vx=2.2*(Math.random()>0.5?1:-1);ball.vy=-3.2;}}
const cleared=grid.every(r=>r.every(c=>c===0));
if(cleared){level++;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c]=Math.random()<0.5+level*0.05?Math.floor(Math.random()*3)+1+level:0;ball.vx*=1.06;ball.vy*=1.06;try{sfx.levelUp();}catch(e){}showToast('LEVEL '+level+'!');}
}

function draw(){
ctx.fillStyle='#010108';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='rgba(131,56,236,0.05)';ctx.lineWidth=0.5;
for(let x=0;x<W;x+=22){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){if(grid[r][c]===0)continue;
const bx=c*cellW+2,by=r*cellH+2,bw=cellW-4,bh=cellH-4;
const cols=['#ff006e','#8338ec','#3a86ff','#00ff88','#ffbe0b'];
ctx.fillStyle=cols[Math.min(4,grid[r][c]-1)];ctx.fillRect(bx,by,bw,bh);
ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
ctx.fillStyle='#fff';ctx.font=`bold ${mob?9:12}px Inter`;ctx.textAlign='center';
ctx.fillText(grid[r][c],bx+bw/2,by+bh/2+(mob?3:4));
}}
const g=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);
g.addColorStop(0,'#ff006e');g.addColorStop(0.5,'#8338ec');g.addColorStop(1,'#3a86ff');
ctx.fillStyle=g;ctx.shadowColor='#8338ec';ctx.shadowBlur=12;
ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);ctx.shadowBlur=0;
ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=16;
ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
gHudL.textContent='SCORE: '+score;gHudR.textContent='❤️x'+lives+' L'+level;
}

function loop(){update();draw();if(!gameOver){extLoopId=requestAnimationFrame(loop);}else{draw();gHudL.textContent='GAME OVER';}}
loop();

extCleanup=()=>{
document.removeEventListener('keydown',onKD);
document.removeEventListener('keyup',onKU);
if(extLoopId){cancelAnimationFrame(extLoopId);extLoopId=null;}
mBtnL.removeEventListener('pointerdown',pressLeft);
mBtnL.removeEventListener('pointerup',releaseLeft);
mBtnR.removeEventListener('pointerdown',pressRight);
mBtnR.removeEventListener('pointerup',releaseRight);
};
}

// ========== FNF ==========
function startFNFLevel(level){
if(fnfCleanup){fnfCleanup();fnfCleanup=null;}
if(fnfLoopId){cancelAnimationFrame(fnfLoopId);fnfLoopId=null;}
fnfOverlay.classList.add('active');
fnfLvlSel.style.display='none';
fnfResult.style.display='none';
const canvas=fnfCanvas;const ctx=canvas.getContext('2d');
canvas.width=fnfStage.clientWidth;canvas.height=fnfStage.clientHeight;
const W=canvas.width,H=canvas.height;
const mob=isMobile();
const ARROWS=['←','↓','↑','→'];
const KEYS=['ArrowLeft','ArrowDown','ArrowUp','ArrowRight'];
const laneX=[W*0.18,W*0.34,W*0.50,W*0.66];
const hitY=H*0.68;
let score=0,combo=0,maxCombo=0,misses=0,playerHp=100,enemyHp=100;
let gameOver=false,levelComplete=false,notes=[],noteSpeed=1.8+level*0.55;
let spawnTimer=0,spawnInterval=Math.max(13,30-level*3);
let keysPressed={},particles=[],shake=0;
const themes={
1:{bg:'#050108',accent:['#ff006e','#8338ec','#3a86ff','#00ff88'],name:'WEEK 1'},
2:{bg:'#030510',accent:['#ff3386','#9b5de5','#4a9eff','#33ff99'],name:'WEEK 2'},
3:{bg:'#010508',accent:['#ff6699','#b37fff','#66b3ff','#55ffaa'],name:'WEEK 3'},
4:{bg:'#080108',accent:['#ff99bb','#c299ff','#80ccff','#77ffbb'],name:'WEEK 4'},
5:{bg:'#010308',accent:['#ffccdd','#d4b3ff','#99d6ff','#99ffcc'],name:'WEEK 5'},
6:{bg:'#000005',accent:['#ffddee','#e6ccff','#b3e0ff','#bbffdd'],name:'WEEK 6'}
};
const th=themes[level];

if(mob){
fnfMobileLanes.style.display='flex';
fnfMobileLanes.innerHTML=ARROWS.map((a,i)=>`<button class="fnf-mobile-btn" data-lane="${i}">${a}</button>`).join('');
fnfMobileLanes.querySelectorAll('.fnf-mobile-btn').forEach(btn=>{
const laneIdx=parseInt(btn.dataset.lane);
const pressHandler=(e)=>{
e.preventDefault();
keysPressed[KEYS[laneIdx]]=true;
pressLane(laneIdx);
};
const releaseHandler=(e)=>{
e.preventDefault();
keysPressed[KEYS[laneIdx]]=false;
};
btn.addEventListener('pointerdown',pressHandler);
btn.addEventListener('touchstart',pressHandler,{passive:false});
btn.addEventListener('pointerup',releaseHandler);
btn.addEventListener('touchend',releaseHandler);
btn.addEventListener('pointerleave',releaseHandler);
btn.addEventListener('pointercancel',releaseHandler);
btn._pressHandler=pressHandler;
btn._releaseHandler=releaseHandler;
});
}else{fnfMobileLanes.style.display='none';}

function pressLane(idx){
if(gameOver||levelComplete)return;
let hit=false;
for(let i=notes.length-1;i>=0;i--){
const n=notes[i];
if(n.lane===idx&&!n.hit&&!n.missed&&!n.enemy&&n.y>hitY-60&&n.y<hitY+40){
const acc=Math.abs(n.y-hitY);
let pts=100,hpG=2;
if(acc<10){pts=300;hpG=5;}
else if(acc<28){pts=200;hpG=3;}
score+=pts;combo++;
if(combo>maxCombo)maxCombo=combo;
playerHp=Math.min(100,playerHp+hpG);
enemyHp=Math.max(0,enemyHp-1);
n.hit=true;hit=true;
try{sfx.hit(idx);}catch(e){}
for(let j=0;j<4;j++)particles.push({x:laneX[idx],y:n.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*4-2,life:1,color:th.accent[idx],size:2+Math.random()*3});
break;
}
}
if(!hit){combo=0;playerHp=Math.max(0,playerHp-5);misses++;shake=6;try{sfx.miss();}catch(e){}}
}

const onKD=(e)=>{
if(gameOver||levelComplete)return;
const idx=KEYS.indexOf(e.key);
if(idx===-1)return;
if(keysPressed[e.key])return;
keysPressed[e.key]=true;
pressLane(idx);
};
const onKU=(e)=>{keysPressed[e.key]=false;};
document.addEventListener('keydown',onKD);
document.addEventListener('keyup',onKU);

function spawnNotes(){
const cnt=Math.min(1+Math.floor(level/2),4);
const used=new Set();
for(let i=0;i<cnt;i++){
let l;
do{l=Math.floor(Math.random()*4);}while(used.has(l)&&used.size<4);
used.add(l);
notes.push({lane:l,y:-20-hitY*0.07*i,hit:false,missed:false,enemy:false});
}
if(Math.random()<0.22+level*0.07)notes.push({lane:Math.floor(Math.random()*4),y:-20,hit:false,missed:false,enemy:true});
}

function upd(){
if(gameOver||levelComplete)return;
spawnTimer++;
if(spawnTimer>=spawnInterval){spawnTimer=0;spawnNotes();}
notes.forEach(n=>{
if(!n.hit&&!n.missed){n.y+=noteSpeed;
if(n.y>H+25){n.missed=true;
if(!n.enemy){combo=0;playerHp=Math.max(0,playerHp-6);misses++;shake=4;try{sfx.miss();}catch(e){}}
}}
});
notes=notes.filter(n=>!n.hit&&!n.missed);
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.035;});particles=particles.filter(p=>p.life>0);
if(shake>0)shake*=0.8;
if(playerHp<=0){gameOver=true;try{sfx.gameOver();}catch(e){}showResult(false);}
if(enemyHp<=0||score>=2500+level*1200){levelComplete=true;try{sfx.levelUp();}catch(e){}if(level<6)fnfUnlocked[level+1]=true;showResult(true);}
fnfHpL.style.width=playerHp+'%';fnfHpR.style.width=enemyHp+'%';
fnfScoreDisp.textContent=score;fnfComboDisp.textContent=combo>0?combo+'x':'';
fnfInstr.textContent=th.name+' | ❌'+misses;
}

function draw(){
ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
const sx=shake*(Math.random()-0.5),sy=shake*(Math.random()-0.5);
ctx.save();ctx.translate(sx,sy);
ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.5;
for(let i=0;i<W;i+=24){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
laneX.forEach((x,i)=>{ctx.fillStyle=i%2===0?'rgba(255,255,255,0.01)':'rgba(255,255,255,0.005)';ctx.fillRect(x-42,0,84,H);});
ctx.strokeStyle='rgba(255,0,110,0.3)';ctx.lineWidth=1.2;ctx.setLineDash([5,10]);
ctx.beginPath();ctx.moveTo(24,hitY);ctx.lineTo(W-24,hitY);ctx.stroke();ctx.setLineDash([]);
ARROWS.forEach((a,i)=>{
const pr=keysPressed[KEYS[i]];
ctx.fillStyle=pr?`rgba(${i===0?'255,0,110':i===1?'131,56,236':i===2?'58,134,255':'0,255,136'},0.22)`:'rgba(255,255,255,0.02)';
ctx.fillRect(laneX[i]-32,hitY-26,64,48);
ctx.strokeStyle=pr?th.accent[i]:'#2a2030';ctx.lineWidth=1.2;
ctx.strokeRect(laneX[i]-32,hitY-26,64,48);
ctx.fillStyle=pr?th.accent[i]:'#444';ctx.font=`bold ${mob?18:22}px Inter`;ctx.textAlign='center';
ctx.fillText(a,laneX[i],hitY+7);
});
notes.forEach(n=>{
const x=laneX[n.lane];
ctx.fillStyle=n.enemy?'rgba(255,255,255,0.4)':th.accent[n.lane];
ctx.shadowColor=n.enemy?'#fff':th.accent[n.lane];ctx.shadowBlur=8;
ctx.beginPath();ctx.moveTo(x,n.y-12);ctx.lineTo(x+12,n.y);ctx.lineTo(x,n.y+12);ctx.lineTo(x-12,n.y);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
});
particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
ctx.restore();
}

function gameLoop(){upd();draw();if(!gameOver&&!levelComplete){fnfLoopId=requestAnimationFrame(gameLoop);}else{draw();}}
gameLoop();

function showResult(w){
fnfResult.style.display='flex';
fnfResTitle.textContent=w?'LEVEL CLEAR!':'GAME OVER';
fnfResTitle.className='fnf-result-title '+(w?'win':'lose');
fnfResStats.innerHTML=`SCORE: ${score}<br>MAX COMBO: ${maxCombo}x<br>MISSES: ${misses}`;
fnfNext.style.display=w&&level<6?'inline-block':'none';
fnfRetry.textContent=w?'AGAIN':'RETRY';
}
fnfRetry.onclick=()=>{startFNFLevel(level);};
fnfNext.onclick=()=>{if(level<6)startFNFLevel(level+1);};

fnfCleanup=()=>{
document.removeEventListener('keydown',onKD);
document.removeEventListener('keyup',onKU);
if(fnfLoopId){cancelAnimationFrame(fnfLoopId);fnfLoopId=null;}
if(mob){fnfMobileLanes.querySelectorAll('.fnf-mobile-btn').forEach(btn=>{
btn.removeEventListener('pointerdown',btn._pressHandler);
btn.removeEventListener('touchstart',btn._pressHandler);
btn.removeEventListener('pointerup',btn._releaseHandler);
btn.removeEventListener('touchend',btn._releaseHandler);
});}
fnfMobileLanes.style.display='none';
};
}

function showFnfSelect(){
fnfOverlay.classList.add('active');
fnfLvlSel.style.display='flex';
fnfResult.style.display='none';
fnfHpL.style.width='100%';fnfHpR.style.width='100%';
fnfScoreDisp.textContent='0';fnfComboDisp.textContent='';fnfInstr.textContent='';
const ctx=fnfCanvas.getContext('2d');ctx.fillStyle='#030105';ctx.fillRect(0,0,fnfCanvas.width,fnfCanvas.height);
fnfLvlGrid.innerHTML='';
for(let i=1;i<=6;i++){
const btn=document.createElement('button');
btn.className='fnf-level-btn'+(fnfUnlocked[i]?'':' locked');
btn.innerHTML=`${i}<br><small>${['EASY','MED','HARD','EXPRT','INSANE','GOD'][i-1]}</small>`;
if(fnfUnlocked[i]){btn.onclick=()=>startFNFLevel(i);}
fnfLvlGrid.appendChild(btn);
}
}

function closeFnf(){
if(fnfCleanup){fnfCleanup();fnfCleanup=null;}
if(fnfLoopId){cancelAnimationFrame(fnfLoopId);fnfLoopId=null;}
fnfOverlay.classList.remove('active');showToast('FNF CLOSED');
}

function closeGame(){
if(extCleanup){extCleanup();extCleanup=null;}
if(extLoopId){cancelAnimationFrame(extLoopId);extLoopId=null;}
gameOverlay.classList.remove('active');
mobileControls.style.display='none';
showToast('GAME CLOSED');
}

// ========== 4D TESSERACT ==========
function createTesseract(){
if(extCleanup){extCleanup();extCleanup=null;}
if(extLoopId){cancelAnimationFrame(extLoopId);extLoopId=null;}
gameOverlay.classList.add('active');
const canvas=gameCanvas;const ctx=canvas.getContext('2d');
const mob=isMobile();
const W=mob?Math.min(360,window.innerWidth-16):750;
const H=mob?400:480;
canvas.width=W;canvas.height=H;
gameStage.style.width=W+'px';gameStage.style.height=H+'px';
mobileControls.style.display='none';
let rx=0,ry=0,rz=0,auto=true;
let keys={};
const onKD=(e)=>{keys[e.key]=true;auto=false;};
const onKU=(e)=>{keys[e.key]=false;};
document.addEventListener('keydown',onKD);
document.addEventListener('keyup',onKU);
const v4=[];for(let i=0;i<16;i++)v4.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1]);
const edges=[];for(let i=0;i<16;i++)for(let j=i+1;j<16;j++){let d=0;for(let k=0;k<4;k++)if(((i>>k)&1)!==((j>>k)&1))d++;if(d===1)edges.push([i,j]);}
function proj(v){
let[x,y,z,w]=v;
let c1=Math.cos(rx),s1=Math.sin(rx),c2=Math.cos(ry),s2=Math.sin(ry),c3=Math.cos(rz),s3=Math.sin(rz);
let x1=x*c1-y*s1,y1=x*s1+y*c1;
let z1=z*c2-w*s2,w1=z*s2+w*c2;
let x2=x1*c3-z1*s3,z2=x1*s3+z1*c3;
let sc=250/(w1+4);
return{x:W/2+x2*sc*48,y:H/2-y1*sc*48,z:z2,w:w1};
}
function draw(){
ctx.fillStyle='#010108';ctx.fillRect(0,0,W,H);
if(auto){rx+=0.007;ry+=0.009;rz+=0.005;}
if(keys['ArrowLeft'])ry-=0.025;if(keys['ArrowRight'])ry+=0.025;
if(keys['ArrowUp'])rx-=0.025;if(keys['ArrowDown'])rx+=0.025;
if(keys[' '])auto=true;
const pts=v4.map(v=>proj(v));
edges.forEach(([i,j])=>{
const a=pts[i],b=pts[j];
ctx.strokeStyle=`hsla(${(a.w+b.w)*35+200},100%,60%,${Math.max(0.12,Math.min(1,(a.w+b.w)/2+0.5))})`;
ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
});
pts.forEach(p=>{ctx.fillStyle=`rgba(255,255,255,${Math.max(0.15,Math.min(1,p.w/4+0.5))})`;ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();});
gHudL.textContent='4D TESSERACT';gHudR.textContent='ARROWS|SPACE';
}
function loop(){draw();extLoopId=requestAnimationFrame(loop);}
loop();
extCleanup=()=>{document.removeEventListener('keydown',onKD);document.removeEventListener('keyup',onKU);if(extLoopId)cancelAnimationFrame(extLoopId);};
}

// ========== GAMES LIST ==========
const games=[
{title:'BLOCK BLAST',icon:'🧊',type:'puzzle',badge:'BLAST',desc:'Разрушайте блоки! Комбо, бонусы, уровни!',play:createBlockBlast},
{title:'FNF: NEON BEATS',icon:'🎤',type:'fnf',badge:'FNF',desc:'Ритм-игра с 6 уровнями! Сенсор + клавиши!',play:showFnfSelect},
{title:'4D TESSERACT',icon:'🌐',type:'action3d',badge:'3D',desc:'Вращающийся гиперкуб. ARROWS / SPACE.',play:createTesseract},
];

function launchGame(game){
if(game.type==='fnf'){game.play();return;}
sfx.launch();showToast('LAUNCHING '+game.title);
extCleanup=game.play();
}

function renderGames(filter='all'){
gameGrid.innerHTML='';
const filtered=games.filter(g=>filter==='all'||g.type===filter||(filter==='blockblast'&&g.type==='puzzle')||(filter==='3d'&&g.type==='action3d'));
filtered.forEach(g=>{
const card=document.createElement('div');card.className='game-card';
card.innerHTML=`<span class="game-card-badge ${g.type==='action3d'?'action3d':g.type}">${g.badge}</span><div class="game-card-icon">${g.icon}</div><div class="game-card-title">${g.title}</div><div class="game-card-desc">${g.desc}</div><button class="game-card-play">▶ PLAY</button>`;
card.querySelector('.game-card-play').addEventListener('click',(e)=>{e.stopPropagation();launchGame(g);});
card.addEventListener('click',()=>launchGame(g));
gameGrid.appendChild(card);
});
}

function signIn(){
if(!booted)return;
sfx.select();loginScreen.classList.add('hidden');showToast('WELCOME, '+users[currentUser]);
}

function selectUser(i){
currentUser=i;
document.querySelectorAll('.login-user-pill').forEach((el,j)=>el.classList.toggle('active',j===i));
loginAvatar.textContent=userIcons[i];sfx.click();
}

function init(){
renderGames();
document.querySelectorAll('.login-user-pill').forEach(el=>el.addEventListener('click',()=>selectUser(parseInt(el.dataset.user))));
loginEnter.addEventListener('click',signIn);
loginScreen.addEventListener('click',(e)=>{if(e.target===loginScreen)signIn();});
document.querySelectorAll('.header-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');renderGames(tab.dataset.filter);sfx.click();});});
document.querySelectorAll('.sidebar-item').forEach((item,i)=>{item.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));item.classList.add('active');sfx.click();});});
document.querySelectorAll('.mobile-nav-item').forEach((item,i)=>{item.addEventListener('click',()=>{document.querySelectorAll('.mobile-nav-item').forEach(el=>el.classList.remove('active'));item.classList.add('active');sfx.click();});});
fnfBack.addEventListener('click',closeFnf);
gameBack.addEventListener('click',closeGame);
document.addEventListener('keydown',(e)=>{
if(!booted)return;
if(!loginScreen.classList.contains('hidden')){if(e.key==='Enter'){e.preventDefault();signIn();}if(e.key==='ArrowLeft'||e.key==='ArrowRight'){e.preventDefault();selectUser((currentUser+(e.key==='ArrowRight'?1:-1)+3)%3);}return;}
if(fnfOverlay.classList.contains('active')&&e.key==='Escape'){e.preventDefault();closeFnf();}
if(gameOverlay.classList.contains('active')&&e.key==='Escape'){e.preventDefault();closeGame();}
});
document.body.addEventListener('click',()=>{try{ac();}catch(e){}},{once:true});
document.body.addEventListener('touchstart',()=>{try{ac();}catch(e){}},{once:true});
setTimeout(()=>{bootScreen.classList.add('hidden');booted=true;showToast('NEON CORE v10.1 READY');},2400);
}
window.addEventListener('DOMContentLoaded',init);
})();
</script>
