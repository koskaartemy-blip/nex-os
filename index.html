<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEON CORE • Ultimate Gaming Console v8.0</title>
  <style>
    :root {
      --bg: #060308;
      --surface: #0d0a12;
      --surface2: #15101c;
      --border: #1f1a28;
      --border2: #2d2638;
      --text: #5a5068;
      --text2: #7a6d8a;
      --text3: #9d8fb0;
      --accent: #ff006e;
      --accent2: #8338ec;
      --accent3: #3a86ff;
      --accent4: #00ff88;
      --accent5: #ffbe0b;
      --accent-dim: #0a0018;
      --glow: rgba(255,0,110,0.1);
      --glow2: rgba(131,56,236,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Inter','SF Pro Display',sans-serif;
      height:100vh; width:100vw;
      overflow:hidden; user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .console {
      width:100vw; height:100vh;
      display:flex; flex-direction:column;
      position:relative; overflow:hidden;
    }

    /* BOOT */
    .boot-screen {
      position:absolute; inset:0; background:#000; z-index:2000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:all 1s cubic-bezier(0.16,1,0.3,1);
    }
    .boot-screen.hidden { opacity:0; pointer-events:none; filter:blur(20px); transform:scale(1.1); }
    .boot-logo {
      font-size:26px; font-weight:900; letter-spacing:14px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3),var(--accent4));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:bootPulse 1.5s ease-in-out infinite;
    }
    @keyframes bootPulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
    .boot-bar {
      width:250px; height:2px; background:#111; margin-top:20px; border-radius:2px; overflow:hidden;
    }
    .boot-bar-fill {
      height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
      width:0%; animation:bootFill 2.4s ease-out forwards;
    }
    @keyframes bootFill { 0%{width:0;} 100%{width:100%;} }

    /* LOGIN */
    .login-screen {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at center,#0a0510 0%,#000 70%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:1500; transition:all 0.6s;
    }
    .login-screen.hidden { opacity:0; pointer-events:none; filter:blur(12px); transform:scale(1.05); }
    .login-grid {
      position:absolute; inset:0; pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
      background-size:45px 45px;
      mask-image:radial-gradient(ellipse at center,black 25%,transparent 70%);
    }
    .login-content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:24px; }
    .login-brand {
      font-size:12px; font-weight:700; letter-spacing:8px;
      background:linear-gradient(135deg,var(--accent),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .login-users { display:flex; gap:14px; }
    .login-user {
      width:72px; height:72px; border-radius:50%; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center; font-size:28px;
      cursor:pointer; transition:0.3s; background:#050208;
    }
    .login-user:hover { border-color:var(--accent2); transform:scale(1.08); box-shadow:0 0 30px var(--glow2); }
    .login-user.active { border-color:var(--accent); box-shadow:0 0 40px var(--glow); }
    .login-name { color:var(--text2); font-size:12px; letter-spacing:4px; font-weight:500; }
    .login-hint {
      position:absolute; bottom:35px; color:var(--border); font-size:8px; letter-spacing:3px;
      animation:hintPulse 2.5s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:0.12;} 50%{opacity:0.45;} }

    /* HEADER */
    .header {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 20px; height:44px; border-bottom:1px solid var(--border);
      background:#050208;
    }
    .header-logo {
      font-size:10px; font-weight:700; letter-spacing:4px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-tabs { display:flex; gap:4px; }
    .header-tab {
      padding:5px 12px; border:1px solid transparent; border-radius:16px;
      color:var(--text); font-size:7px; letter-spacing:2px; cursor:pointer;
      transition:0.2s; text-transform:uppercase; background:transparent;
      font-family:inherit; font-weight:500;
    }
    .header-tab:hover { border-color:var(--border2); color:var(--text2); }
    .header-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(255,0,110,0.04); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .header-dot { width:6px; height:6px; border-radius:50%; background:var(--accent4); box-shadow:0 0 10px var(--accent4); }
    .header-time { color:var(--text2); font-size:8px; }

    .content { flex:1; display:flex; overflow:hidden; }

    /* SIDEBAR */
    .sidebar {
      width:48px; border-right:1px solid var(--border);
      display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:4px;
      background:#050208;
    }
    .sidebar-item {
      width:34px; height:34px; display:flex; align-items:center; justify-content:center;
      font-size:13px; color:var(--text); cursor:pointer; transition:0.2s;
      border-radius:8px; opacity:0.3;
    }
    .sidebar-item:hover { opacity:0.75; background:var(--surface2); }
    .sidebar-item.active { opacity:1; color:var(--accent); background:var(--accent-dim); }

    /* MAIN */
    .main {
      flex:1; display:flex; flex-direction:column; padding:18px 22px; gap:16px; overflow-y:auto;
    }
    .main-title { color:var(--text3); font-size:12px; font-weight:700; letter-spacing:3px; }
    .main-count { color:var(--text); font-size:8px; }
    .game-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px;
    }
    .game-card {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:20px; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden;
    }
    .game-card:hover { border-color:var(--accent2); transform:translateY(-3px); box-shadow:0 15px 35px rgba(0,0,0,0.5),0 0 30px var(--glow2); }
    .game-card::after {
      content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background:radial-gradient(circle at 40% 0%,var(--glow),transparent 70%); opacity:0; transition:0.3s;
    }
    .game-card:hover::after { opacity:1; }
    .game-card-badge {
      position:absolute; top:10px; right:10px; font-size:6px; font-weight:700;
      letter-spacing:1px; padding:3px 9px; border-radius:10px; z-index:1;
    }
    .game-card-badge.fnf { background:var(--accent); color:#fff; }
    .game-card-badge.action3d { background:var(--accent2); color:#fff; }
    .game-card-badge.arcade { background:var(--accent4); color:#000; }
    .game-card-icon { font-size:36px; margin-bottom:10px; position:relative; z-index:1; }
    .game-card-title { color:var(--text3); font-size:14px; font-weight:700; letter-spacing:1px; margin-bottom:6px; position:relative; z-index:1; }
    .game-card-desc { color:var(--text); font-size:9px; line-height:1.5; position:relative; z-index:1; }
    .game-card-play {
      margin-top:12px; padding:7px 16px; border:1px solid var(--accent); border-radius:16px;
      background:transparent; color:var(--accent); font-family:inherit; font-size:8px;
      font-weight:600; letter-spacing:2px; cursor:pointer; transition:0.2s;
      text-transform:uppercase; position:relative; z-index:1;
    }
    .game-card:hover .game-card-play { background:var(--accent); color:#fff; }

    /* FNF OVERLAY */
    .fnf-overlay {
      position:fixed; inset:0; z-index:1000; background:#030105;
      display:none; flex-direction:column; align-items:center; justify-content:center;
    }
    .fnf-overlay.active { display:flex; }
    .fnf-stage {
      position:relative; width:900px; height:550px;
      border:1px solid var(--border2); box-shadow:0 0 100px rgba(131,56,236,0.2);
      overflow:hidden;
    }
    .fnf-canvas { display:block; width:100%; height:100%; }
    .fnf-hud {
      position:absolute; top:0; left:0; right:0; display:flex;
      justify-content:space-between; padding:14px 20px; pointer-events:none;
    }
    .fnf-hp-left, .fnf-hp-right {
      width:180px; height:8px; background:#1a1018; border-radius:4px; overflow:hidden;
    }
    .fnf-hp-fill-left {
      height:100%; background:linear-gradient(90deg,var(--accent),#ff3386);
      transition:width 0.2s; border-radius:4px;
    }
    .fnf-hp-fill-right {
      height:100%; background:linear-gradient(90deg,#ff3386,var(--accent));
      transition:width 0.2s; border-radius:4px;
    }
    .fnf-score-display {
      text-align:center; color:#fff; font-size:14px; font-weight:700;
      letter-spacing:3px; text-shadow:0 0 20px var(--accent);
    }
    .fnf-combo-display {
      text-align:center; color:var(--accent5); font-size:11px; font-weight:700;
      letter-spacing:2px;
    }
    .fnf-instructions {
      position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
      color:var(--text); font-size:9px; letter-spacing:2px; pointer-events:none;
    }
    .fnf-level-select {
      position:absolute; inset:0; background:rgba(3,1,5,0.95);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; z-index:10;
    }
    .fnf-level-title {
      font-size:32px; font-weight:900; letter-spacing:6px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .fnf-level-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    }
    .fnf-level-btn {
      padding:16px 28px; border:1px solid var(--border2); border-radius:12px;
      background:var(--surface); color:var(--text2); font-family:inherit;
      font-size:11px; font-weight:700; letter-spacing:3px; cursor:pointer;
      transition:0.2s; text-transform:uppercase;
    }
    .fnf-level-btn:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 25px var(--glow); }
    .fnf-level-btn.locked { opacity:0.3; pointer-events:none; }
    .fnf-level-difficulty {
      font-size:7px; letter-spacing:2px; color:var(--text); margin-top:4px;
    }
    .fnf-result {
      position:absolute; inset:0; background:rgba(3,1,5,0.95);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; z-index:10;
    }
    .fnf-result-title {
      font-size:28px; font-weight:900; letter-spacing:4px;
    }
    .fnf-result-title.win { color:var(--accent4); }
    .fnf-result-title.lose { color:var(--accent); }
    .fnf-result-stats { color:var(--text2); font-size:12px; letter-spacing:2px; text-align:center; }
    .fnf-result-btn {
      padding:10px 24px; border:1px solid var(--accent); border-radius:20px;
      background:transparent; color:var(--accent); font-family:inherit;
      font-size:10px; font-weight:600; letter-spacing:3px; cursor:pointer; transition:0.2s;
    }
    .fnf-result-btn:hover { background:var(--accent); color:#fff; }
    .fnf-back-btn {
      position:absolute; bottom:14px; right:20px;
      padding:8px 20px; border:1px solid var(--accent); border-radius:20px;
      background:rgba(0,0,0,0.7); color:var(--accent); font-family:inherit;
      font-size:9px; font-weight:600; letter-spacing:2px; cursor:pointer;
      transition:0.2s; text-transform:uppercase; z-index:20;
    }
    .fnf-back-btn:hover { background:var(--accent); color:#000; }

    /* TOASTS */
    .toast-container {
      position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column-reverse; gap:5px; z-index:3000;
    }
    .toast {
      padding:9px 22px; background:rgba(6,3,8,0.95); border:1px solid var(--accent);
      color:var(--accent); font-size:9px; font-weight:600; letter-spacing:2px;
      border-radius:6px; opacity:0; transform:translateY(8px); transition:0.3s;
      backdrop-filter:blur(10px); text-transform:uppercase;
    }
    .toast.show { opacity:1; transform:translateY(0); }

    @media(max-width:768px) {
      .game-grid { grid-template-columns:1fr; }
      .fnf-stage { width:100vw; height:100vw; }
    }
  </style>
</head>
<body>
  <div class="console" id="consoleApp">
    <!-- BOOT -->
    <div class="boot-screen" id="bootScreen">
      <div class="boot-logo">NEON CORE</div>
      <div class="boot-bar"><div class="boot-bar-fill"></div></div>
    </div>

    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
      <div class="login-grid"></div>
      <div class="login-content">
        <div class="login-brand">NEON CORE</div>
        <div class="login-users" id="avatarList">
          <div class="login-user active" data-user="0">⚡</div>
          <div class="login-user" data-user="1">💀</div>
          <div class="login-user" data-user="2">👁</div>
        </div>
        <div class="login-name" id="loginName">CYPHER</div>
      </div>
      <div class="login-hint">PRESS ENTER TO CONTINUE</div>
    </div>

    <!-- FNF OVERLAY -->
    <div class="fnf-overlay" id="fnfOverlay">
      <div class="fnf-stage" id="fnfStage">
        <canvas class="fnf-canvas" id="fnfCanvas"></canvas>
        <div class="fnf-hud">
          <div class="fnf-hp-left"><div class="fnf-hp-fill-left" id="fnfHpLeft" style="width:100%"></div></div>
          <div>
            <div class="fnf-score-display" id="fnfScoreDisplay">0</div>
            <div class="fnf-combo-display" id="fnfComboDisplay"></div>
          </div>
          <div class="fnf-hp-right"><div class="fnf-hp-fill-right" id="fnfHpRight" style="width:100%"></div></div>
        </div>
        <div class="fnf-instructions" id="fnfInstructions"></div>
        <div class="fnf-level-select" id="fnfLevelSelect">
          <div class="fnf-level-title">FRIDAY NIGHT FUNKIN'</div>
          <div class="fnf-level-grid" id="fnfLevelGrid"></div>
        </div>
        <div class="fnf-result" id="fnfResult" style="display:none;">
          <div class="fnf-result-title" id="fnfResultTitle"></div>
          <div class="fnf-result-stats" id="fnfResultStats"></div>
          <button class="fnf-result-btn" id="fnfRetryBtn">RETRY</button>
          <button class="fnf-result-btn" id="fnfNextBtn">NEXT LEVEL</button>
        </div>
        <button class="fnf-back-btn" id="fnfBackBtn">✕ EXIT</button>
      </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="header">
      <div class="header-logo">NEON CORE</div>
      <div class="header-tabs">
        <button class="header-tab active" data-filter="all">ALL</button>
        <button class="header-tab" data-filter="fnf">🎤 FNF</button>
        <button class="header-tab" data-filter="3d">🧊 3D</button>
        <button class="header-tab" data-filter="arcade">🕹️ ARCADE</button>
      </div>
      <div class="header-right">
        <div class="header-dot"></div>
        <div class="header-time" id="liveTime">00:00</div>
      </div>
    </div>

    <div class="content">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-item active">⌂</div>
        <div class="sidebar-item">🎮</div>
        <div class="sidebar-item">🏆</div>
        <div class="sidebar-item">⚙</div>
        <div class="sidebar-item">⏻</div>
      </div>
      <div class="main">
        <div class="main-title">🎮 GAME LIBRARY</div>
        <div class="main-count" id="gameCount">8 GAMES</div>
        <div class="game-grid" id="gameGrid"></div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
  </div>

<script>
(()=>{
let audioCtx=null;
const ac=()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;};
const tone=(f,d=0.1,v=0.03,type='square')=>{try{const a=ac();const t=a.currentTime;const o=a.createOscillator();const g=a.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d);}catch(e){}};
const sfx={click:()=>tone(600,0.06,0.02,'sine'),select:()=>{tone(800,0.08,0.025);setTimeout(()=>tone(1000,0.06,0.02),50);},launch:()=>{tone(400,0.15,0.03,'triangle');setTimeout(()=>tone(800,0.12,0.03),100);},hit:p=>tone(440+p*110,0.1,0.04,'square'),miss:()=>tone(100,0.2,0.05,'sawtooth'),levelUp:()=>{tone(523,0.1,0.04);setTimeout(()=>tone(659,0.1,0.04),100);setTimeout(()=>tone(784,0.15,0.05),200);},gameOver:()=>{tone(200,0.3,0.05,'sawtooth');setTimeout(()=>tone(100,0.5,0.04),200);}};

const $=id=>document.getElementById(id);
const bootScreen=$('bootScreen'),loginScreen=$('loginScreen');
const fnfOverlay=$('fnfOverlay'),fnfCanvas=$('fnfCanvas'),fnfStage=$('fnfStage');
const fnfScoreDisplay=$('fnfScoreDisplay'),fnfComboDisplay=$('fnfComboDisplay');
const fnfHpLeft=$('fnfHpLeft'),fnfHpRight=$('fnfHpRight');
const fnfInstructions=$('fnfInstructions'),fnfLevelSelect=$('fnfLevelSelect');
const fnfLevelGrid=$('fnfLevelGrid'),fnfResult=$('fnfResult');
const fnfResultTitle=$('fnfResultTitle'),fnfResultStats=$('fnfResultStats');
const fnfRetryBtn=$('fnfRetryBtn'),fnfNextBtn=$('fnfNextBtn'),fnfBackBtn=$('fnfBackBtn');
const gameGrid=$('gameGrid'),liveTime=$('liveTime'),gameCount=$('gameCount');
const toastContainer=$('toastContainer'),loginName=$('loginName');

const users=['CYPHER','GHOST','VOID'],userIcons=['⚡','💀','👁'];
let currentUser=0,booted=false,currentFnfLevel=null,fnfCleanup=null,fnfLoopId=null;
const fnfUnlockedLevels={1:true,2:true,3:false,4:false,5:false,6:false};

function showToast(msg){
const el=document.createElement('div');el.className='toast';el.textContent=msg;
toastContainer.appendChild(el);requestAnimationFrame(()=>el.classList.add('show'));
setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},2000);
}

// ============================================================
// 🎤 FNF - ПОЛНОСТЬЮ ПЕРЕРАБОТАННЫЙ
// ============================================================
function startFNFLevel(level){
if(fnfCleanup)fnfCleanup();if(fnfLoopId)cancelAnimationFrame(fnfLoopId);
currentFnfLevel=level;
fnfOverlay.classList.add('active');
fnfLevelSelect.style.display='none';
fnfResult.style.display='none';
const canvas=fnfCanvas;
const ctx=canvas.getContext('2d');
canvas.width=fnfStage.clientWidth;
canvas.height=fnfStage.clientHeight;

const W=canvas.width,H=canvas.height;
const ARROWS=['←','↓','↑','→'];
const KEYS=['ArrowLeft','ArrowDown','ArrowUp','ArrowRight'];
const laneX=[W*0.22,W*0.38,W*0.54,W*0.7];
const hitY=H*0.72;

let score=0,combo=0,maxCombo=0,misses=0;
let playerHp=100,enemyHp=100;
let gameOver=false,levelComplete=false;
let notes=[];
let noteSpeed=2.5+level*0.7;
let spawnTimer=0;
let spawnInterval=Math.max(15,35-level*3);
let keysPressed={};
let particles=[];
let shakeAmount=0;
let beat=0;

const levelThemes={
1:{bg:'#050108',grid:'#0d0a15',accent:['#ff006e','#8338ec','#3a86ff','#00ff88'],enemy:'👾',name:'WEEK 1: EASY'},
2:{bg:'#030510',grid:'#0a0d18',accent:['#ff3386','#9b5de5','#4a9eff','#33ff99'],enemy:'🤖',name:'WEEK 2: MEDIUM'},
3:{bg:'#010508',grid:'#081018',accent:['#ff6699','#b37fff','#66b3ff','#55ffaa'],enemy:'👽',name:'WEEK 3: HARD'},
4:{bg:'#080108',grid:'#150a15',accent:['#ff99bb','#c299ff','#80ccff','#77ffbb'],enemy:'💀',name:'WEEK 4: EXPERT'},
5:{bg:'#010308',grid:'#0a0a18',accent:['#ffccdd','#d4b3ff','#99d6ff','#99ffcc'],enemy:'🔥',name:'WEEK 5: INSANE'},
6:{bg:'#000005',grid:'#0a0a20',accent:['#ffddee','#e6ccff','#b3e0ff','#bbffdd'],enemy:'⚡',name:'WEEK 6: GOD'}
};
const theme=levelThemes[level];

function spawnNotes(){
const count=Math.min(1+Math.floor(level/2),4);
const usedLanes=new Set();
for(let i=0;i<count;i++){
let lane;
do{lane=Math.floor(Math.random()*4);}while(usedLanes.has(lane)&&usedLanes.size<4);
usedLanes.add(lane);
notes.push({lane,y:-20-hitY*0.1*i,hit:false,missed:false,enemy:false});
}
if(Math.random()<0.3+level*0.1){
const enemyLane=Math.floor(Math.random()*4);
notes.push({lane:enemyLane,y:-20,hit:false,missed:false,enemy:true});
}
}

function createParticles(x,y,color){
for(let i=0;i<6;i++){
particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color,size:2+Math.random()*3});
}
}

function onKeyDown(e){
if(gameOver||levelComplete)return;
const idx=KEYS.indexOf(e.key);
if(idx===-1)return;
if(keysPressed[e.key])return;
keysPressed[e.key]=true;
let hit=false;
for(let i=notes.length-1;i>=0;i--){
const note=notes[i];
if(note.lane===idx&&!note.hit&&!note.missed&&!note.enemy&&note.y>hitY-55&&note.y<hitY+40){
const accuracy=Math.abs(note.y-hitY);
let points=100;let hpGain=2;
if(accuracy<15){points=300;hpGain=5;}
else if(accuracy<35){points=200;hpGain=3;}
else if(accuracy<55){points=100;hpGain=2;}
else{points=50;hpGain=1;}
score+=points;combo++;if(combo>maxCombo)maxCombo=combo;
playerHp=Math.min(100,playerHp+hpGain);
enemyHp=Math.max(0,enemyHp-1);
note.hit=true;hit=true;
sfx.hit(idx);
createParticles(laneX[idx],note.y,theme.accent[idx]);
break;
}
}
if(!hit){combo=0;playerHp=Math.max(0,playerHp-6);sfx.miss();misses++;shakeAmount=8;}
}

function onKeyUp(e){keysPressed[e.key]=false;}
document.addEventListener('keydown',onKeyDown);
document.addEventListener('keyup',onKeyUp);

function update(){
if(gameOver||levelComplete)return;
beat=(beat+0.02)%(Math.PI*2);
spawnTimer++;
if(spawnTimer>=spawnInterval){spawnTimer=0;spawnNotes();}
notes.forEach(note=>{
if(!note.hit&&!note.missed){
note.y+=noteSpeed;
if(note.y>H+30){
note.missed=true;
if(!note.enemy){combo=0;playerHp=Math.max(0,playerHp-8);sfx.miss();misses++;shakeAmount=6;}
}
}
});
notes=notes.filter(n=>!n.hit&&!n.missed);
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.025;});
particles=particles.filter(p=>p.life>0);
if(shakeAmount>0)shakeAmount*=0.85;
if(playerHp<=0){gameOver=true;sfx.gameOver();showResult(false);}
if(enemyHp<=0||score>=4000+level*2000){levelComplete=true;sfx.levelUp();if(level<6)fnfUnlockedLevels[level+1]=true;showResult(true);}
fnfHpLeft.style.width=playerHp+'%';fnfHpRight.style.width=enemyHp+'%';
fnfScoreDisplay.textContent=score;fnfComboDisplay.textContent=combo>0?combo+'x COMBO':'';
fnfInstructions.textContent=theme.name+' | MISSES: '+misses+' | 🎤 vs '+theme.enemy;
}

function draw(){
ctx.fillStyle=theme.bg;ctx.fillRect(0,0,W,H);
const sx=shakeAmount*(Math.random()-0.5),sy=shakeAmount*(Math.random()-0.5);
ctx.save();ctx.translate(sx,sy);
// Сетка
ctx.strokeStyle=theme.grid;ctx.lineWidth=0.5;
for(let i=0;i<W;i+=30){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
for(let i=0;i<H;i+=30){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
// Дорожки
laneX.forEach((x,i)=>{
ctx.fillStyle='rgba(255,255,255,0.015)';ctx.fillRect(x-50,0,100,H);
ctx.strokeStyle=i===0||i===2?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.03)';ctx.lineWidth=1;
ctx.strokeRect(x-50,0,100,H);
});
// Линия
ctx.strokeStyle='rgba(255,0,110,0.4)';ctx.lineWidth=2;ctx.setLineDash([8,16]);
ctx.beginPath();ctx.moveTo(40,hitY);ctx.lineTo(W-40,hitY);ctx.stroke();ctx.setLineDash([]);
// Приёмные стрелки
ARROWS.forEach((a,i)=>{
const pressed=keysPressed[KEYS[i]];
ctx.fillStyle=pressed?`rgba(${i===0?'255,0,110':i===1?'131,56,236':i===2?'58,134,255':'0,255,136'},0.3)`:'rgba(255,255,255,0.03)';
ctx.fillRect(laneX[i]-38,hitY-30,76,56);
ctx.strokeStyle=pressed?theme.accent[i]:'#2a2030';ctx.lineWidth=2;
ctx.strokeRect(laneX[i]-38,hitY-30,76,56);
ctx.fillStyle=pressed?theme.accent[i]:'#555';ctx.font='bold 26px Inter';ctx.textAlign='center';
ctx.fillText(a,laneX[i],hitY+10);
});
// Ноты
notes.forEach(note=>{
const x=laneX[note.lane];
const color=theme.accent[note.lane];
ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=12;
if(note.enemy){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.shadowColor='#fff';}
ctx.beginPath();ctx.moveTo(x,note.y-16);ctx.lineTo(x+16,note.y);ctx.lineTo(x,note.y+16);ctx.lineTo(x-16,note.y);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
});
// Частицы
particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
ctx.globalAlpha=1;
// Эффект бита
ctx.strokeStyle=`rgba(255,255,255,${0.05+Math.sin(beat)*0.03})`;ctx.lineWidth=2;
ctx.beginPath();ctx.arc(W/2,H/2,120+Math.sin(beat)*20,0,Math.PI*2);ctx.stroke();
ctx.restore();
}

function gameLoop(){update();draw();if(!gameOver&&!levelComplete)fnfLoopId=requestAnimationFrame(gameLoop);else draw();}
gameLoop();

function showResult(won){
fnfResult.style.display='flex';
fnfResultTitle.textContent=won?'LEVEL CLEAR!':'GAME OVER';
fnfResultTitle.className='fnf-result-title '+(won?'win':'lose');
fnfResultStats.innerHTML=`SCORE: ${score}<br>MAX COMBO: ${maxCombo}x<br>MISSES: ${misses}<br>HP: ${Math.round(playerHp)}%`;
fnfNextBtn.style.display=won&&level<6?'block':'none';
fnfRetryBtn.textContent=won?'PLAY AGAIN':'TRY AGAIN';
}
fnfRetryBtn.onclick=()=>{startFNFLevel(level);};
fnfNextBtn.onclick=()=>{if(level<6)startFNFLevel(level+1);};

fnfCleanup=()=>{
document.removeEventListener('keydown',onKeyDown);
document.removeEventListener('keyup',onKeyUp);
if(fnfLoopId)cancelAnimationFrame(fnfLoopId);
};
}

function showFnfLevelSelect(){
fnfOverlay.classList.add('active');
fnfLevelSelect.style.display='flex';
fnfResult.style.display='none';
fnfHpLeft.style.width='100%';fnfHpRight.style.width='100%';
fnfScoreDisplay.textContent='0';fnfComboDisplay.textContent='';
fnfInstructions.textContent='';
const ctx=fnfCanvas.getContext('2d');
ctx.fillStyle='#030105';ctx.fillRect(0,0,fnfCanvas.width,fnfCanvas.height);
fnfLevelGrid.innerHTML='';
for(let i=1;i<=6;i++){
const btn=document.createElement('button');
btn.className='fnf-level-btn'+(fnfUnlockedLevels[i]?'':' locked');
btn.innerHTML=`WEEK ${i}<div class="fnf-level-difficulty">${['EASY','MEDIUM','HARD','EXPERT','INSANE','GOD'][i-1]}</div>`;
if(fnfUnlockedLevels[i])btn.onclick=()=>startFNFLevel(i);
fnfLevelGrid.appendChild(btn);
}
}

function closeFnf(){
if(fnfCleanup)fnfCleanup();if(fnfLoopId)cancelAnimationFrame(fnfLoopId);
fnfOverlay.classList.remove('active');currentFnfLevel=null;showToast('FNF CLOSED');
}

// 🧊 3D ИГРЫ
// ============================================================
function createTesseractGame(canvas){
const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=450;
let rx=0,ry=0,rz=0,auto=true;let keys={};
const onK=e=>{keys[e.key]=true;auto=false;};const onU=e=>{keys[e.key]=false;};
document.addEventListener('keydown',onK);document.addEventListener('keyup',onU);
const v4=[];for(let i=0;i<16;i++)v4.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1]);
const edges=[];for(let i=0;i<16;i++)for(let j=i+1;j<16;j++){let d=0;for(let k=0;k<4;k++)if(((i>>k)&1)!==((j>>k)&1))d++;if(d===1)edges.push([i,j]);}
function proj(v){let[x,y,z,w]=v;let c1=Math.cos(rx),s1=Math.sin(rx),c2=Math.cos(ry),s2=Math.sin(ry),c3=Math.cos(rz),s3=Math.sin(rz);let x1=x*c1-y*s1,y1=x*s1+y*c1;let z1=z*c2-w*s2,w1=z*s2+w*c2;let x2=x1*c3-z1*s3,z2=x1*s3+z1*c3;let sc=300/(w1+4);return{x:400+x2*sc*55,y:225-y1*sc*55,z:z2,w:w1};}
function draw(){
ctx.fillStyle='#060308';ctx.fillRect(0,0,800,450);
if(auto){rx+=0.008;ry+=0.01;rz+=0.006;}
if(keys['ArrowLeft'])ry-=0.03;if(keys['ArrowRight'])ry+=0.03;if(keys['ArrowUp'])rx-=0.03;if(keys['ArrowDown'])rx+=0.03;if(keys[' '])auto=true;
const pts=v4.map(v=>proj(v));
edges.forEach(([i,j])=>{const a=pts[i],b=pts[j];const al=Math.max(0.15,Math.min(1,(a.w+b.w)/2+0.5));ctx.strokeStyle=`hsla(${(a.w+b.w)*40+200},100%,60%,${al})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
pts.forEach(p=>{ctx.fillStyle=`rgba(255,255,255,${Math.max(0.2,Math.min(1,p.w/4+0.5))})`;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
}
function loop(){draw();requestAnimationFrame(loop);}loop();
return ()=>{document.removeEventListener('keydown',onK);document.removeEventListener('keyup',onU);};
}

function createBreakoutGame(canvas){
const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=450;
let pad={x:350,y:420,w:90,h:10};let ball={x:400,y:300,vx:4,vy:-4,r:7};
let bricks=[],score=0,lives=3,gameOver=false;let keys={};
const onK=e=>{keys[e.key]=true;};const onU=e=>{keys[e.key]=false;};
document.addEventListener('keydown',onK);document.addEventListener('keyup',onU);
for(let r=0;r<4;r++)for(let c=0;c<10;c++)bricks.push({x:60+c*70,y:40+r*28,w:62,h:20,alive:true,hue:(r*50+c*20)%360});
function upd(){
if(gameOver)return;
if(keys['ArrowLeft'])pad.x=Math.max(8,pad.x-6);
if(keys['ArrowRight'])pad.x=Math.min(702,pad.x+6);
ball.x+=ball.vx;ball.y+=ball.vy;
if(ball.x-ball.r<0||ball.x+ball.r>800)ball.vx*=-1;
if(ball.y-ball.r<0)ball.vy*=-1;
if(ball.y+ball.r>pad.y&&ball.y-ball.r<pad.y+pad.h&&ball.x>pad.x&&ball.x<pad.x+pad.w){ball.vy=-Math.abs(ball.vy);ball.vx=((ball.x-pad.x)/pad.w-0.5)*8;sfx.click();}
bricks.forEach(b=>{if(!b.alive)return;if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){b.alive=false;ball.vy*=-1;score+=100;sfx.hit(0);}});
if(ball.y+ball.r>450){lives--;if(lives<=0){gameOver=true;sfx.gameOver();}else{ball.x=400;ball.y=300;ball.vx=4;ball.vy=-4;}}
}
function draw(){
ctx.fillStyle='#060308';ctx.fillRect(0,0,800,450);
bricks.forEach(b=>{if(!b.alive)return;ctx.fillStyle=`hsl(${b.hue},100%,50%)`;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.strokeStyle='#000';ctx.strokeRect(b.x,b.y,b.w,b.h);});
ctx.fillStyle='#fff';ctx.fillRect(pad.x,pad.y,pad.w,pad.h);
ctx.fillStyle='#ff006e';ctx.shadowColor='#ff006e';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}
function loop(){upd();draw();if(!gameOver)requestAnimationFrame(loop);else draw();}loop();
return ()=>{document.removeEventListener('keydown',onK);document.removeEventListener('keyup',onU);};
}

// ============================================================
// СПИСОК ИГР
// ============================================================
const games=[
{title:'FNF: NEON BEATS',icon:'🎤',type:'fnf',badge:'FNF',desc:'Полноценная ритм-игра с 6 уровнями! Сражайтесь с противниками в музыкальных битвах!',play:showFnfLevelSelect},
{title:'4D TESSERACT',icon:'🧊',type:'action3d',badge:'3D',desc:'Вращающийся 4D гиперкуб. Управляйте стрелками, SPACE для автопилота.',play:(c)=>createTesseractGame(c)},
{title:'NEON BREAKOUT',icon:'🧱',type:'arcade',badge:'ARCADE',desc:'Классический арканоид. Разбейте все кирпичи!',play:(c)=>createBreakoutGame(c)},
];

function renderGames(filter='all'){
gameGrid.innerHTML='';
const filtered=games.filter(g=>filter==='all'||g.type===filter||(filter==='3d'&&g.type==='action3d'));
gameCount.textContent=filtered.length+' GAMES';
filtered.forEach(g=>{
const card=document.createElement('div');card.className='game-card';
card.innerHTML=`
${g.badge?`<div class="game-card-badge ${g.type==='action3d'?'action3d':g.type}">${g.badge}</div>`:''}
<div class="game-card-icon">${g.icon}</div>
<div class="game-card-title">${g.title}</div>
<div class="game-card-desc">${g.desc}</div>
<button class="game-card-play">▶ PLAY</button>
`;
card.querySelector('.game-card-play').addEventListener('click',e=>{e.stopPropagation();launchGame(g);});
card.addEventListener('click',()=>launchGame(g));
gameGrid.appendChild(card);
});
}

let currentExternalCleanup=null;
function launchGame(game){
if(currentExternalCleanup)currentExternalCleanup();
if(game.title.includes('FNF')){game.play();return;}
const tempCanvas=document.createElement('canvas');
tempCanvas.style.cssText='position:fixed;inset:0;z-index:999;background:#060308;';
document.body.appendChild(tempCanvas);
sfx.launch();showToast('LAUNCHING '+game.title);
currentExternalCleanup=game.play(tempCanvas);
const exitBtn=document.createElement('button');
exitBtn.textContent='✕ EXIT';exitBtn.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;padding:10px 24px;border:1px solid #ff006e;border-radius:20px;background:rgba(0,0,0,0.8);color:#ff006e;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:2px;cursor:pointer;';
document.body.appendChild(exitBtn);
exitBtn.onclick=()=>{
if(currentExternalCleanup)currentExternalCleanup();
tempCanvas.remove();exitBtn.remove();currentExternalCleanup=null;showToast('GAME CLOSED');
};
}

// ============================================================
// INIT
// ============================================================
function signIn(){if(!booted)return;sfx.select();loginScreen.classList.add('hidden');showToast('WELCOME, '+users[currentUser]);}
function selectUser(i){currentUser=i;document.querySelectorAll('.login-user').forEach((el,j)=>el.classList.toggle('active',j===i));loginName.textContent=users[currentUser];sfx.click();}
function updateClock(){liveTime.textContent=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}

function init(){
updateClock();setInterval(updateClock,30000);renderGames();
document.querySelectorAll('.login-user').forEach(el=>el.addEventListener('click',()=>selectUser(parseInt(el.dataset.user))));
loginScreen.addEventListener('click',e=>{if(e.target===loginScreen||e.target.classList.contains('login-grid'))signIn();});
document.querySelectorAll('.header-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');renderGames(tab.dataset.filter);sfx.click();});});
document.querySelectorAll('.sidebar-item').forEach((item,i)=>{item.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));item.classList.add('active');sfx.click();});});
fnfBackBtn.addEventListener('click',closeFnf);
document.addEventListener('keydown',e=>{
if(!booted)return;
if(!loginScreen.classList.contains('hidden')){if(e.key==='Enter'){e.preventDefault();signIn();}if(e.key==='ArrowLeft'||e.key==='ArrowRight'){e.preventDefault();selectUser((currentUser+(e.key==='ArrowRight'?1:-1)+3)%3);}return;}
if(fnfOverlay.classList.contains('active')&&e.key==='Escape'){e.preventDefault();closeFnf();}
});
document.body.addEventListener('click',()=>ac(),{once:true});
setTimeout(()=>{bootScreen.classList.add('hidden');booted=true;showToast('NEON CORE OS v8.0 READY');},2500);
}
window.addEventListener('DOMContentLoaded',init);
})();
</script>
