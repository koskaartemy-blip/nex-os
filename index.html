<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NEON CORE • Ultimate Console v10</title>
  <style>
    :root {
      --bg: #010108;
      --surface: #080420;
      --surface2: #0f0830;
      --border: #1a1240;
      --border2: #2d2058;
      --text: #4a3870;
      --text2: #6b52a0;
      --text3: #8b6fc8;
      --accent: #ff006e;
      --accent2: #8338ec;
      --accent3: #3a86ff;
      --accent4: #00ff88;
      --accent5: #ffbe0b;
      --accent6: #ff6b35;
      --accent-dim: #0a0020;
      --glow: rgba(255,0,110,0.12);
      --glow2: rgba(131,56,236,0.18);
      --glow3: rgba(58,134,255,0.15);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; }
    body {
      background: var(--bg);
      font-family: 'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif;
      height:100%; width:100%;
      overflow:hidden; user-select:none; -webkit-user-select:none;
      -webkit-tap-highlight-color:transparent; touch-action:manipulation;
      -webkit-font-smoothing:antialiased;
    }
    .console { width:100%; height:100%; display:flex; flex-direction:column; position:relative; overflow:hidden; }

    /* ========== BOOT SCREEN ========== */
    .boot-screen {
      position:absolute; inset:0; background:#000; z-index:5000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:all 1s cubic-bezier(0.16,1,0.3,1);
      gap:20px;
    }
    .boot-screen.hidden { opacity:0; pointer-events:none; filter:blur(30px); transform:scale(1.15); }
    .boot-icon {
      width:60px; height:60px; border:2px solid var(--accent); border-radius:16px;
      display:flex; align-items:center; justify-content:center; font-size:28px;
      animation:bootPulse 1.2s ease-in-out infinite;
      box-shadow:0 0 40px var(--glow);
    }
    @keyframes bootPulse {
      0%,100% { box-shadow:0 0 40px var(--glow); transform:scale(1); }
      50% { box-shadow:0 0 80px var(--glow2); transform:scale(1.08); }
    }
    .boot-text {
      font-size:22px; font-weight:900; letter-spacing:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3),var(--accent4));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .boot-ring {
      width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--accent);
      border-radius:50%; animation:bootSpin 0.8s linear infinite;
    }
    @keyframes bootSpin { to{transform:rotate(360deg);} }

    /* ========== LOGIN SCREEN ========== */
    .login-screen {
      position:absolute; inset:0;
      background:radial-gradient(ellipse at center,var(--surface) 0%,#000 70%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:3000; transition:all 0.6s;
      gap:8px;
    }
    .login-screen.hidden { opacity:0; pointer-events:none; filter:blur(15px); transform:scale(1.06); }
    .login-bg {
      position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(131,56,236,0.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(131,56,236,0.02) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image:radial-gradient(ellipse at center,black 20%,transparent 70%);
    }
    .login-stars { position:absolute; inset:0; pointer-events:none; }
    .login-star {
      position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
      animation:starTwinkle linear infinite; opacity:0;
    }
    @keyframes starTwinkle {
      0%,100% { opacity:0; } 30% { opacity:0.8; } 60% { opacity:0.2; }
    }
    .login-card {
      position:relative; z-index:2;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:28px 32px;
      display:flex; flex-direction:column; align-items:center; gap:24px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      max-width:90vw;
    }
    .login-avatar {
      width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);
      display:flex; align-items:center; justify-content:center; font-size:36px;
      box-shadow:0 0 40px var(--glow); margin-bottom:4px;
    }
    .login-greeting { color:var(--text3); font-size:13px; font-weight:600; letter-spacing:3px; }
    .login-users { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .login-user-pill {
      padding:8px 16px; border:1px solid var(--border); border-radius:20px;
      color:var(--text); font-size:10px; letter-spacing:2px; cursor:pointer;
      transition:all 0.25s; background:var(--surface2); display:flex; align-items:center; gap:6px;
    }
    .login-user-pill:hover { border-color:var(--accent2); color:var(--text2); }
    .login-user-pill.active { border-color:var(--accent); color:var(--accent); box-shadow:0 0 20px var(--glow); }
    .login-enter {
      padding:10px 28px; border:1px solid var(--accent); border-radius:24px;
      background:var(--accent); color:#fff; font-family:inherit; font-size:10px;
      font-weight:700; letter-spacing:3px; cursor:pointer; transition:0.2s;
      text-transform:uppercase;
    }
    .login-enter:hover { box-shadow:0 0 30px var(--glow); transform:scale(1.03); }
    .login-hint {
      position:absolute; bottom:30px; color:var(--border); font-size:8px; letter-spacing:2px;
      animation:hintPulse 3s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:0.12;} 50%{opacity:0.5;} }

    /* ========== HEADER ========== */
    .header {
      display:flex; justify-content:space-between; align-items:center;
      padding:6px 16px; height:44px; border-bottom:1px solid var(--border);
      background:rgba(8,4,32,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      z-index:100;
    }
    .header-left { display:flex; align-items:center; gap:8px; }
    .header-logo-icon {
      width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:14px;
    }
    .header-logo-text {
      font-size:10px; font-weight:800; letter-spacing:3px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-tabs { display:flex; gap:2px; }
    .header-tab {
      padding:5px 10px; border:1px solid transparent; border-radius:14px;
      color:var(--text); font-size:8px; letter-spacing:1px; cursor:pointer;
      transition:0.2s; text-transform:uppercase; background:transparent;
      font-family:inherit; font-weight:500; white-space:nowrap;
    }
    .header-tab:hover { border-color:var(--border2); color:var(--text2); }
    .header-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(255,0,110,0.06); }
    .header-right { display:flex; align-items:center; gap:10px; }
    .header-status { display:flex; align-items:center; gap:5px; color:var(--text2); font-size:8px; }
    .header-dot { width:6px; height:6px; border-radius:50%; background:var(--accent4); box-shadow:0 0 10px var(--accent4); }

    /* ========== CONTENT ========== */
    .content { flex:1; display:flex; overflow:hidden; position:relative; }

    /* ========== SIDEBAR (Desktop) ========== */
    .sidebar {
      width:52px; border-right:1px solid var(--border);
      display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:2px;
      background:var(--surface);
    }
    .sidebar-item {
      width:38px; height:38px; display:flex; align-items:center; justify-content:center;
      font-size:14px; color:var(--text); cursor:pointer; transition:0.2s;
      border-radius:10px; opacity:0.35; position:relative;
    }
    .sidebar-item:hover { opacity:0.8; background:var(--surface2); }
    .sidebar-item.active { opacity:1; color:var(--accent); background:var(--accent-dim); }
    .sidebar-item .notif-dot {
      position:absolute; top:6px; right:6px; width:6px; height:6px;
      background:var(--accent); border-radius:50%; box-shadow:0 0 8px var(--accent);
    }
    .sidebar-divider { width:24px; height:1px; background:var(--border); margin:6px 0; }

    /* ========== MAIN ========== */
    .main {
      flex:1; display:flex; flex-direction:column; padding:16px 20px; gap:14px;
      overflow-y:auto; overflow-x:hidden;
    }
    .main-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
    .main-title { color:var(--text3); font-size:13px; font-weight:700; letter-spacing:2px; }
    .main-filters { display:flex; gap:4px; flex-wrap:wrap; }
    .filter-chip {
      padding:5px 10px; border:1px solid var(--border); border-radius:14px;
      color:var(--text); font-size:8px; letter-spacing:1px; cursor:pointer;
      transition:0.2s; background:transparent; font-family:inherit; white-space:nowrap;
    }
    .filter-chip:hover { border-color:var(--border2); color:var(--text2); }
    .filter-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(255,0,110,0.05); }

    /* GAME GRID */
    .game-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px;
    }
    .game-card {
      background:var(--surface); border:1px solid var(--border); border-radius:16px;
      padding:18px; cursor:pointer; transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      position:relative; overflow:hidden; display:flex; flex-direction:column;
    }
    .game-card::after {
      content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background:radial-gradient(circle at 40% 0%,var(--glow),transparent 70%);
      opacity:0; transition:0.4s;
    }
    .game-card:hover { border-color:var(--accent2); transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,0.5),0 0 30px var(--glow2); }
    .game-card:hover::after { opacity:1; }
    .game-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; position:relative; z-index:1; }
    .game-card-badge {
      font-size:7px; font-weight:700; letter-spacing:1px; padding:4px 10px; border-radius:10px;
    }
    .game-card-badge.fnf { background:var(--accent); color:#fff; }
    .game-card-badge.puzzle { background:var(--accent6); color:#fff; }
    .game-card-badge.action3d { background:var(--accent2); color:#fff; }
    .game-card-icon { font-size:36px; margin-bottom:8px; position:relative; z-index:1; }
    .game-card-title { color:var(--text3); font-size:14px; font-weight:700; letter-spacing:1px; margin-bottom:4px; position:relative; z-index:1; }
    .game-card-desc { color:var(--text); font-size:9px; line-height:1.5; flex:1; position:relative; z-index:1; }
    .game-card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; position:relative; z-index:1; }
    .game-card-play {
      padding:7px 16px; border:1px solid var(--accent); border-radius:16px;
      background:transparent; color:var(--accent); font-family:inherit;
      font-size:8px; font-weight:600; letter-spacing:2px; cursor:pointer; transition:0.2s;
    }
    .game-card:hover .game-card-play { background:var(--accent); color:#fff; }

    /* ========== MOBILE NAV ========== */
    .mobile-nav {
      display:none; height:56px; border-top:1px solid var(--border);
      background:rgba(8,4,32,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      padding-bottom:var(--safe-bottom);
    }
    .mobile-nav-inner { display:flex; height:100%; align-items:center; justify-content:space-around; }
    .mobile-nav-item {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      color:var(--text); font-size:18px; cursor:pointer; transition:0.2s; opacity:0.4;
      padding:4px 12px; border-radius:10px;
    }
    .mobile-nav-item.active { opacity:1; color:var(--accent); }
    .mobile-nav-label { font-size:8px; letter-spacing:1px; }

    /* ========== GAME OVERLAY ========== */
    .game-overlay {
      position:fixed; inset:0; z-index:2000; background:var(--bg);
      display:none; flex-direction:column; align-items:center; justify-content:center;
    }
    .game-overlay.active { display:flex; }
    .game-stage {
      position:relative; border:1px solid var(--border2);
      box-shadow:0 0 100px var(--glow2); border-radius:12px; overflow:hidden;
      max-width:95vw; max-height:80vh;
    }
    .game-stage canvas { display:block; width:100%; height:100%; }
    .game-hud {
      position:absolute; top:0; left:0; right:0; display:flex;
      justify-content:space-between; padding:12px 16px; pointer-events:none;
    }
    .game-hud-text {
      color:#fff; font-size:11px; font-weight:700; letter-spacing:2px;
      text-shadow:0 0 14px var(--accent);
    }
    .game-back-btn {
      position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
      padding:10px 24px; border:1px solid var(--accent); border-radius:22px;
      background:rgba(0,0,0,0.85); color:var(--accent); font-family:inherit;
      font-size:10px; font-weight:600; letter-spacing:2px; cursor:pointer;
      transition:0.2s; z-index:10;
    }
    .game-back-btn:hover { background:var(--accent); color:#000; }
    .mobile-controls {
      display:none; position:absolute; bottom:70px; left:0; right:0;
      justify-content:center; gap:20px; z-index:10;
    }
    .mobile-ctrl-btn {
      width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,0.3);
      background:rgba(0,0,0,0.5); color:#fff; font-size:20px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;
    }
    .mobile-ctrl-btn:active { background:rgba(255,0,110,0.3); border-color:var(--accent); }

    /* FNF OVERLAY */
    .fnf-overlay {
      position:fixed; inset:0; z-index:2000; background:#030105;
      display:none; flex-direction:column; align-items:center; justify-content:center;
    }
    .fnf-overlay.active { display:flex; }
    .fnf-stage {
      position:relative; width:min(900px,95vw); height:min(550px,70vh);
      border:1px solid var(--border2); box-shadow:0 0 120px var(--glow2);
      overflow:hidden; border-radius:12px;
    }
    .fnf-canvas { display:block; width:100%; height:100%; }
    .fnf-hud {
      position:absolute; top:0; left:0; right:0; display:flex;
      justify-content:space-between; padding:12px 16px; pointer-events:none;
    }
    .fnf-hp { width:40vw; max-width:160px; height:6px; background:#1a1018; border-radius:3px; overflow:hidden; }
    .fnf-hp-fill { height:100%; transition:width 0.2s; border-radius:3px; }
    .fnf-hp-left .fnf-hp-fill { background:linear-gradient(90deg,var(--accent),#ff3386); }
    .fnf-hp-right .fnf-hp-fill { background:linear-gradient(90deg,#ff3386,var(--accent)); }
    .fnf-score { text-align:center; color:#fff; font-size:13px; font-weight:700; letter-spacing:2px; text-shadow:0 0 16px var(--accent); }
    .fnf-combo { text-align:center; color:var(--accent5); font-size:10px; font-weight:700; letter-spacing:2px; }
    .fnf-instructions {
      position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
      color:var(--text); font-size:8px; letter-spacing:2px; pointer-events:none;
    }
    .fnf-level-select {
      position:absolute; inset:0; background:rgba(3,1,5,0.96);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; z-index:10;
    }
    .fnf-level-title {
      font-size:min(28px,6vw); font-weight:900; letter-spacing:4px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .fnf-level-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 16px; }
    .fnf-level-btn {
      padding:14px 20px; border:1px solid var(--border2); border-radius:12px;
      background:var(--surface); color:var(--text2); font-family:inherit;
      font-size:10px; font-weight:700; letter-spacing:2px; cursor:pointer; transition:0.2s;
    }
    .fnf-level-btn:hover { border-color:var(--accent); color:var(--accent); }
    .fnf-level-btn.locked { opacity:0.3; pointer-events:none; }
    .fnf-result {
      position:absolute; inset:0; background:rgba(3,1,5,0.96);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; z-index:10;
    }
    .fnf-result-title { font-size:24px; font-weight:900; letter-spacing:3px; }
    .fnf-result-title.win { color:var(--accent4); }
    .fnf-result-title.lose { color:var(--accent); }
    .fnf-result-btn {
      padding:8px 20px; border:1px solid var(--accent); border-radius:18px;
      background:transparent; color:var(--accent); font-family:inherit;
      font-size:9px; font-weight:600; letter-spacing:2px; cursor:pointer; transition:0.2s;
    }
    .fnf-result-btn:hover { background:var(--accent); color:#fff; }
    .fnf-back-btn {
      position:absolute; bottom:12px; right:16px;
      padding:7px 16px; border:1px solid var(--accent); border-radius:18px;
      background:rgba(0,0,0,0.7); color:var(--accent); font-family:inherit;
      font-size:8px; font-weight:600; letter-spacing:2px; cursor:pointer; transition:0.2s; z-index:20;
    }
    .fnf-back-btn:hover { background:var(--accent); color:#000; }
    .fnf-mobile-lanes {
      display:none; position:absolute; bottom:50px; left:0; right:0;
      justify-content:center; gap:8px; z-index:10;
    }
    .fnf-mobile-btn {
      width:44px; height:60px; border:2px solid rgba(255,255,255,0.2); border-radius:8px;
      background:rgba(0,0,0,0.5); color:#fff; font-size:20px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .fnf-mobile-btn:active { background:rgba(255,0,110,0.4); border-color:var(--accent); }

    /* TOASTS */
    .toast-container {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column-reverse; gap:5px; z-index:6000;
    }
    .toast {
      padding:8px 20px; background:rgba(8,4,32,0.95); border:1px solid var(--accent);
      color:var(--accent); font-size:9px; font-weight:600; letter-spacing:2px;
      border-radius:8px; opacity:0; transform:translateY(8px); transition:0.3s;
      backdrop-filter:blur(10px); text-transform:uppercase; text-align:center;
    }
    .toast.show { opacity:1; transform:translateY(0); }

    /* ========== RESPONSIVE ========== */
    @media(max-width:768px) {
      .sidebar { display:none; }
      .mobile-nav { display:block; }
      .header-tabs { overflow-x:auto; gap:2px; -webkit-overflow-scrolling:touch; }
      .header-tab { font-size:7px; padding:4px 7px; flex-shrink:0; }
      .header-logo-text { display:none; }
      .game-grid { grid-template-columns:1fr; gap:10px; }
      .game-card { padding:14px; }
      .game-card-icon { font-size:30px; }
      .game-card-title { font-size:13px; }
      .main { padding:12px 14px; gap:10px; }
      .main-title { font-size:11px; }
      .filter-chip { font-size:7px; padding:4px 8px; }
      .game-stage { max-width:98vw; max-height:70vh; }
      .game-hud-text { font-size:9px; }
      .mobile-controls { display:flex; }
      .fnf-stage { width:98vw; height:60vh; }
      .fnf-mobile-lanes { display:flex; }
      .fnf-hud { padding:8px 10px; }
      .fnf-score { font-size:11px; }
      .fnf-level-grid { grid-template-columns:repeat(3,1fr); gap:6px; }
      .fnf-level-btn { padding:10px 12px; font-size:8px; }
      .toast-container { bottom:100px; }
    }
    @media(min-width:769px) {
      .mobile-nav { display:none; }
      .mobile-controls { display:none; }
      .fnf-mobile-lanes { display:none; }
    }
  </style>
</head>
<body>
  <div class="console" id="consoleApp">
    <!-- BOOT -->
    <div class="boot-screen" id="bootScreen">
      <div class="boot-icon">⬡</div>
      <div class="boot-text">NEON CORE</div>
      <div class="boot-ring"></div>
    </div>

    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
      <div class="login-bg"></div>
      <div class="login-stars" id="loginStars"></div>
      <div class="login-card">
        <div class="login-avatar" id="loginAvatar">⚡</div>
        <div class="login-greeting">WELCOME BACK</div>
        <div class="login-users" id="avatarList">
          <button class="login-user-pill active" data-user="0">⚡ CYPHER</button>
          <button class="login-user-pill" data-user="1">💀 GHOST</button>
          <button class="login-user-pill" data-user="2">👁 VOID</button>
        </div>
        <button class="login-enter" id="loginEnter">ENTER SYSTEM</button>
      </div>
      <div class="login-hint">TAP OR PRESS ENTER</div>
    </div>

    <!-- FNF OVERLAY -->
    <div class="fnf-overlay" id="fnfOverlay">
      <div class="fnf-stage" id="fnfStage">
        <canvas class="fnf-canvas" id="fnfCanvas"></canvas>
        <div class="fnf-hud">

<script>
(()=>{
let audioCtx=null;
const ac=()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;};
const tone=(f,d=0.1,v=0.03,type='square')=>{try{const a=ac();const t=a.currentTime;const o=a.createOscillator();const g=a.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d);}catch(e){}};
const sfx={click:()=>tone(600,0.06,0.02,'sine'),select:()=>{tone(800,0.08,0.025);setTimeout(()=>tone(1000,0.06,0.02),50);},launch:()=>{tone(400,0.15,0.03,'triangle');setTimeout(()=>tone(800,0.12,0.03),100);},hit:p=>tone(440+p*110,0.1,0.04,'square'),miss:()=>tone(100,0.2,0.05,'sawtooth'),levelUp:()=>{tone(523,0.1,0.04);setTimeout(()=>tone(659,0.1,0.04),100);setTimeout(()=>tone(784,0.15,0.05),200);},gameOver:()=>{tone(200,0.3,0.05,'sawtooth');setTimeout(()=>tone(100,0.5,0.04),200);},blockBreak:()=>{tone(800,0.08,0.03);setTimeout(()=>tone(1200,0.06,0.02),40);}};

const $=id=>document.getElementById(id);
const bootScreen=$('bootScreen'),loginScreen=$('loginScreen'),loginEnter=$('loginEnter'),loginAvatar=$('loginAvatar'),loginStars=$('loginStars');
const fnfOverlay=$('fnfOverlay'),fnfCanvas=$('fnfCanvas'),fnfStage=$('fnfStage');
const fnfScoreDisp=$('fnfScoreDisp'),fnfComboDisp=$('fnfComboDisp'),fnfHpL=$('fnfHpL'),fnfHpR=$('fnfHpR'),fnfInstr=$('fnfInstr');
const fnfLvlSel=$('fnfLvlSel'),fnfLvlGrid=$('fnfLvlGrid'),fnfResult=$('fnfResult'),fnfResTitle=$('fnfResTitle'),fnfResStats=$('fnfResStats'),fnfRetry=$('fnfRetry'),fnfNext=$('fnfNext'),fnfBack=$('fnfBack'),fnfMobileLanes=$('fnfMobileLanes');
const gameOverlay=$('gameOverlay'),gameCanvas=$('gameCanvas'),gameStage=$('gameStage'),gHudL=$('gHudL'),gHudR=$('gHudR'),gameBack=$('gameBack'),mobileControls=$('mobileControls'),mBtnL=$('mBtnL'),mBtnR=$('mBtnR');
const gameGrid=$('gameGrid'),toastContainer=$('toastContainer');

const users=['CYPHER','GHOST','VOID'],userIcons=['⚡','💀','👁'];
let currentUser=0,booted=false,fnfCleanup=null,fnfLoopId=null,extCleanup=null,extLoopId=null;
const fnfUnlocked={1:true,2:true,3:false,4:false,5:false,6:false};

function showToast(msg){
const el=document.createElement('div');el.className='toast';el.textContent=msg;
toastContainer.appendChild(el);requestAnimationFrame(()=>el.classList.add('show'));
setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},2000);
}

function isMobile(){return window.innerWidth<=768;}

function createStars(){for(let i=0;i<40;i++){const s=document.createElement('div');s.className='login-star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDuration=(3+Math.random()*6)+'s';s.style.animationDelay=Math.random()*4+'s';s.style.width=(1+Math.random()*2)+'px';s.style.height=s.style.width;loginStars.appendChild(s);}}

// ============================================================
// 🧊 BLOCK BLAST
// ============================================================
function createBlockBlast(){
gameOverlay.classList.add('active');
const canvas=gameCanvas;const ctx=canvas.getContext('2d');
const isMob=isMobile();const W=isMob?Math.min(400,window.innerWidth-20):800;const H=isMob?500:550;
canvas.width=W;canvas.height=H;gameStage.style.width=W+'px';gameStage.style.height=H+'px';
if(isMob)mobileControls.style.display='flex';else mobileControls.style.display='none';

const COLS=10,ROWS=7;
const cellW=W/COLS,cellH=H*0.45/ROWS;
let grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++){grid[r][c]=Math.random()<0.65?Math.floor(Math.random()*4)+1:0;}}
let paddle={x:W/2-55,y:H-35,w:isMob?90:110,h:10};
let ball={x:W/2,y:H-55,vx:2.5*(Math.random()>0.5?1:-1),vy:-3.5,r:7};
let score=0,combo=0,lives=3,gameOver=false,level=1,particles=[];
let keys={};let mobileLeft=false,mobileRight=false;
const onK=e=>{keys[e.key]=true;};const onU=e=>{keys[e.key]=false;};
document.addEventListener('keydown',onK);document.addEventListener('keyup',onU);
mBtnL.addEventListener('pointerdown',()=>{mobileLeft=true;mBtnL.style.background='rgba(255,0,110,0.3)';});
mBtnL.addEventListener('pointerup',()=>{mobileLeft=false;mBtnL.style.background='rgba(0,0,0,0.5)';});
mBtnL.addEventListener('pointerleave',()=>{mobileLeft=false;mBtnL.style.background='rgba(0,0,0,0.5)';});
mBtnR.addEventListener('pointerdown',()=>{mobileRight=true;mBtnR.style.background='rgba(255,0,110,0.3)';});
mBtnR.addEventListener('pointerup',()=>{mobileRight=false;mBtnR.style.background='rgba(0,0,0,0.5)';});
mBtnR.addEventListener('pointerleave',()=>{mobileRight=false;mBtnR.style.background='rgba(0,0,0,0.5)';});

function makeParticles(x,y,c){for(let i=0;i<6;i++)particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*4-2,life:1,color:c,size:2+Math.random()*3});}

function update(){
if(gameOver)return;
const moveSpeed=isMob?5:7;
if(keys['ArrowLeft']||mobileLeft)paddle.x=Math.max(0,paddle.x-moveSpeed);
if(keys['ArrowRight']||mobileRight)paddle.x=Math.min(W-paddle.w,paddle.x+moveSpeed);
if(isMob){gameCanvas.addEventListener('pointermove',e=>{const rect=gameCanvas.getBoundingClientRect();const tx=e.clientX-rect.left;paddle.x=Math.max(0,Math.min(W-paddle.w,tx-paddle.w/2));});}
ball.x+=ball.vx;ball.y+=ball.vy;
if(ball.x-ball.r<0||ball.x+ball.r>W)ball.vx*=-1;
if(ball.y-ball.r<0)ball.vy*=-1;
if(ball.y+ball.r>paddle.y&&ball.y-ball.r<paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){ball.vy=-Math.abs(ball.vy);ball.vx=((ball.x-paddle.x)/paddle.w-0.5)*8;combo=0;sfx.click();}
let hit=false;
for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){if(grid[r][c]===0)continue;const bx=c*cellW,by=r*cellH;if(ball.x+ball.r>bx&&ball.x-ball.r<bx+cellW&&ball.y+ball.r>by&&ball.y-ball.r<by+cellH){grid[r][c]--;score+=100;combo++;if(combo>1)score+=combo*15;sfx.blockBreak();makeParticles(bx+cellW/2,by+cellH/2,['#ff006e','#8338ec','#3a86ff','#00ff88'][Math.min(3,grid[r][c])]);ball.vy*=-1;hit=true;break;}}if(hit)break;}
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.03;});particles=particles.filter(p=>p.life>0);
if(ball.y+ball.r>H){lives--;combo=0;if(lives<=0){gameOver=true;sfx.gameOver();}else{ball.x=W/2;ball.y=H-55;ball.vx=2.5*(Math.random()>0.5?1:-1);ball.vy=-3.5;}}
const cleared=grid.every(r=>r.every(c=>c===0));
if(cleared){level++;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c]=Math.random()<0.55+level*0.06?Math.floor(Math.random()*3)+1+level:0;ball.vx*=1.08;ball.vy*=1.08;sfx.levelUp();showToast('LEVEL '+level+'!');}
}

function draw(){
ctx.fillStyle='#010108';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='rgba(131,56,236,0.06)';ctx.lineWidth=0.5;
for(let x=0;x<W;x+=25){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=25){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){if(grid[r][c]===0)continue;const bx=c*cellW+2,by=r*cellH+2,bw=cellW-4,bh=cellH-4;const cols=['#ff006e','#8338ec','#3a86ff','#00ff88','#ffbe0b'];ctx.fillStyle=cols[Math.min(4,grid[r][c]-1)];ctx.fillRect(bx,by,bw,bh);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);ctx.fillStyle='#fff';ctx.font=`bold ${isMob?10:13}px Inter`;ctx.textAlign='center';ctx.fillText(grid[r][c],bx+bw/2,by+bh/2+(isMob?4:5));}}
const g=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);g.addColorStop(0,'#ff006e');g.addColorStop(0.5,'#8338ec');g.addColorStop(1,'#3a86ff');ctx.fillStyle=g;ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);ctx.shadowColor='#8338ec';ctx.shadowBlur=15;ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);ctx.shadowBlur=0;
ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
gHudL.textContent='SCORE: '+score;gHudR.textContent='❤️ x'+lives+' | LVL '+level;
}

function loop(){update();draw();if(!gameOver)extLoopId=requestAnimationFrame(loop);else{draw();gHudL.textContent='GAME OVER';}}
loop();
return ()=>{document.removeEventListener('keydown',onK);document.removeEventListener('keyup',onU);if(extLoopId)cancelAnimationFrame(extLoopId);mobileControls.style.display='none';};
}

// ============================================================
// 🎤 FNF
// ============================================================
function startFNFLevel(level){
if(fnfCleanup)fnfCleanup();if(fnfLoopId)cancelAnimationFrame(fnfLoopId);
currentFnfLevel=level;fnfOverlay.classList.add('active');fnfLvlSel.style.display='none';fnfResult.style.display='none';
const canvas=fnfCanvas;const ctx=canvas.getContext('2d');
canvas.width=fnfStage.clientWidth;canvas.height=fnfStage.clientHeight;
const W=canvas.width,H=canvas.height;const isMob=isMobile();
const ARROWS=['←','↓','↑','→'];const KEYS=['ArrowLeft','ArrowDown','ArrowUp','ArrowRight'];
const laneX=[W*0.2,W*0.36,W*0.52,W*0.68];const hitY=H*0.7;
let score=0,combo=0,maxCombo=0,misses=0,playerHp=100,enemyHp=100;
let gameOver=false,levelComplete=false,notes=[],noteSpeed=2+level*0.6,spawnTimer=0,spawnInterval=Math.max(14,32-level*3),keysPressed={},particles=[],shake=0,beat=0;
const themes={1:{bg:'#050108',accent:['#ff006e','#8338ec','#3a86ff','#00ff88'],enemy:'👾',name:'WEEK 1'},2:{bg:'#030510',accent:['#ff3386','#9b5de5','#4a9eff','#33ff99'],enemy:'🤖',name:'WEEK 2'},3:{bg:'#010508',accent:['#ff6699','#b37fff','#66b3ff','#55ffaa'],enemy:'👽',name:'WEEK 3'},4:{bg:'#080108',accent:['#ff99bb','#c299ff','#80ccff','#77ffbb'],enemy:'💀',name:'WEEK 4'},5:{bg:'#010308',accent:['#ffccdd','#d4b3ff','#99d6ff','#99ffcc'],enemy:'🔥',name:'WEEK 5'},6:{bg:'#000005',accent:['#ffddee','#e6ccff','#b3e0ff','#bbffdd'],enemy:'⚡',name:'WEEK 6'}};
const th=themes[level];

if(isMob){fnfMobileLanes.style.display='flex';fnfMobileLanes.innerHTML=ARROWS.map((a,i)=>`<button class="fnf-mobile-btn" data-lane="${i}">${a}</button>`).join('');fnfMobileLanes.querySelectorAll('.fnf-mobile-btn').forEach(btn=>{btn.addEventListener('pointerdown',()=>{const l=parseInt(btn.dataset.lane);keysPressed[KEYS[l]]=true;pressLane(l);});btn.addEventListener('pointerup',()=>{const l=parseInt(btn.dataset.lane);keysPressed[KEYS[l]]=false;});btn.addEventListener('pointerleave',()=>{const l=parseInt(btn.dataset.lane);keysPressed[KEYS[l]]=false;});});}else{fnfMobileLanes.style.display='none';}

function pressLane(idx){if(gameOver||levelComplete)return;let hit=false;for(let i=notes.length-1;i>=0;i--){const n=notes[i];if(n.lane===idx&&!n.hit&&!n.missed&&!n.enemy&&n.y>hitY-50&&n.y<hitY+35){const acc=Math.abs(n.y-hitY);let pts=100,hpG=2;if(acc<12){pts=300;hpG=5;}else if(acc<30){pts=200;hpG=3;}else{pts=100;hpG=2;}score+=pts;combo++;if(combo>maxCombo)maxCombo=combo;playerHp=Math.min(100,playerHp+hpG);enemyHp=Math.max(0,enemyHp-1);n.hit=true;hit=true;sfx.hit(idx);for(let j=0;j<5;j++)particles.push({x:laneX[idx],y:n.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*4-2,life:1,color:th.accent[idx],size:2+Math.random()*3});break;}}if(!hit){combo=0;playerHp=Math.max(0,playerHp-5);sfx.miss();misses++;shake=7;}}

function onKD(e){if(gameOver||levelComplete)return;const idx=KEYS.indexOf(e.key);if(idx===-1)return;if(keysPressed[e.key])return;keysPressed[e.key]=true;pressLane(idx);}
function onKU(e){keysPressed[e.key]=false;}
document.addEventListener('keydown',onKD);document.addEventListener('keyup',onKU);

function spawnNotes(){const cnt=Math.min(1+Math.floor(level/2),4);const used=new Set();for(let i=0;i<cnt;i++){let l;do{l=Math.floor(Math.random()*4);}while(used.has(l)&&used.size<4);used.add(l);notes.push({lane:l,y:-20-hitY*0.08*i,hit:false,missed:false,enemy:false});}if(Math.random()<0.25+level*0.08)notes.push({lane:Math.floor(Math.random()*4),y:-20,hit:false,missed:false,enemy:true});}

function upd(){
if(gameOver||levelComplete)return;beat+=0.02;spawnTimer++;if(spawnTimer>=spawnInterval){spawnTimer=0;spawnNotes();}
notes.forEach(n=>{if(!n.hit&&!n.missed){n.y+=noteSpeed;if(n.y>H+25){n.missed=true;if(!n.enemy){combo=0;playerHp=Math.max(0,playerHp-7);sfx.miss();misses++;shake=5;}}}});
notes=notes.filter(n=>!n.hit&&!n.missed);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.03;});particles=particles.filter(p=>p.life>0);
if(shake>0)shake*=0.82;
if(playerHp<=0){gameOver=true;sfx.gameOver();showResult(false);}
if(enemyHp<=0||score>=3000+level*1500){levelComplete=true;sfx.levelUp();if(level<6)fnfUnlocked[level+1]=true;showResult(true);}
fnfHpL.style.width=playerHp+'%';fnfHpR.style.width=enemyHp+'%';fnfScoreDisp.textContent=score;fnfComboDisp.textContent=combo>0?combo+'x':'';
fnfInstr.textContent=th.name+' | MISS:'+misses+' | 🎤 vs '+th.enemy;
}

function draw(){
ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);const sx=shake*(Math.random()-0.5),sy=shake*(Math.random()-0.5);ctx.save();ctx.translate(sx,sy);
ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;for(let i=0;i<W;i+=28){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
laneX.forEach((x,i)=>{ctx.fillStyle=i%2===0?'rgba(255,255,255,0.012)':'rgba(255,255,255,0.006)';ctx.fillRect(x-45,0,90,H);});
ctx.strokeStyle='rgba(255,0,110,0.35)';ctx.lineWidth=1.5;ctx.setLineDash([6,12]);ctx.beginPath();ctx.moveTo(30,hitY);ctx.lineTo(W-30,hitY);ctx.stroke();ctx.setLineDash([]);
ARROWS.forEach((a,i)=>{const pr=keysPressed[KEYS[i]];ctx.fillStyle=pr?`rgba(${i===0?'255,0,110':i===1?'131,56,236':i===2?'58,134,255':'0,255,136'},0.25)`:'rgba(255,255,255,0.02)';ctx.fillRect(laneX[i]-34,hitY-28,68,50);ctx.strokeStyle=pr?th.accent[i]:'#2a2030';ctx.lineWidth=1.5;ctx.strokeRect(laneX[i]-34,hitY-28,68,50);ctx.fillStyle=pr?th.accent[i]:'#444';ctx.font=`bold ${isMob?20:24}px Inter`;ctx.textAlign='center';ctx.fillText(a,laneX[i],hitY+8);});
notes.forEach(n=>{const x=laneX[n.lane];ctx.fillStyle=n.enemy?'rgba(255,255,255,0.45)':th.accent[n.lane];ctx.shadowColor=n.enemy?'#fff':th.accent[n.lane];ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(x,n.y-14);ctx.lineTo(x+14,n.y);ctx.lineTo(x,n.y+14);ctx.lineTo(x-14,n.y);ctx.closePath();ctx.fill();ctx.shadowBlur=0;});
particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
ctx.restore();
}

function gameLoop(){upd();draw();if(!gameOver&&!levelComplete)fnfLoopId=requestAnimationFrame(gameLoop);else draw();}
gameLoop();

function showResult(w){fnfResult.style.display='flex';fnfResTitle.textContent=w?'LEVEL CLEAR!':'GAME OVER';fnfResTitle.className='fnf-result-title '+(w?'win':'lose');fnfResStats.innerHTML=`SCORE: ${score}<br>MAX COMBO: ${maxCombo}x<br>MISSES: ${misses}`;fnfNext.style.display=w&&level<6?'inline-block':'none';fnfRetry.textContent=w?'AGAIN':'RETRY';}
fnfRetry.onclick=()=>startFNFLevel(level);fnfNext.onclick=()=>{if(level<6)startFNFLevel(level+1);};
fnfCleanup=()=>{document.removeEventListener('keydown',onKD);document.removeEventListener('keyup',onKU);if(fnfLoopId)cancelAnimationFrame(fnfLoopId);fnfMobileLanes.style.display='none';};
}

function showFnfSelect(){
fnfOverlay.classList.add('active');fnfLvlSel.style.display='flex';fnfResult.style.display='none';
fnfHpL.style.width='100%';fnfHpR.style.width='100%';fnfScoreDisp.textContent='0';fnfComboDisp.textContent='';fnfInstr.textContent='';
const ctx=fnfCanvas.getContext('2d');ctx.fillStyle='#030105';ctx.fillRect(0,0,fnfCanvas.width,fnfCanvas.height);
fnfLvlGrid.innerHTML='';for(let i=1;i<=6;i++){const btn=document.createElement('button');btn.className='fnf-level-btn'+(fnfUnlocked[i]?'':' locked');btn.innerHTML=`${i}<br><small>${['EASY','MED','HARD','EXPRT','INSANE','GOD'][i-1]}</small>`;if(fnfUnlocked[i])btn.onclick=()=>startFNFLevel(i);fnfLvlGrid.appendChild(btn);}
}
function closeFnf(){if(fnfCleanup)fnfCleanup();if(fnfLoopId)cancelAnimationFrame(fnfLoopId);fnfOverlay.classList.remove('active');currentFnfLevel=null;showToast('FNF CLOSED');}
function closeGame(){if(extCleanup)extCleanup();if(extLoopId)cancelAnimationFrame(extLoopId);gameOverlay.classList.remove('active');mobileControls.style.display='none';extCleanup=null;showToast('GAME CLOSED');}

// ============================================================
// 4D TESSERACT
// ============================================================
function createTesseract(){
gameOverlay.classList.add('active');const canvas=gameCanvas;const ctx=canvas.getContext('2d');
const W=isMobile()?Math.min(380,window.innerWidth-16):800;const H=isMobile()?420:500;
canvas.width=W;canvas.height=H;gameStage.style.width=W+'px';gameStage.style.height=H+'px';
mobileControls.style.display='none';
let rx=0,ry=0,rz=0,auto=true;let keys={};
const onK=e=>{keys[e.key]=true;auto=false;};const onU=e=>{keys[e.key]=false;};
document.addEventListener('keydown',onK);document.addEventListener('keyup',onU);
const v4=[];for(let i=0;i<16;i++)v4.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1]);
const edges=[];for(let i=0;i<16;i++)for(let j=i+1;j<16;j++){let d=0;for(let k=0;k<4;k++)if(((i>>k)&1)!==((j>>k)&1))d++;if(d===1)edges.push([i,j]);}
function proj(v){let[x,y,z,w]=v;let c1=Math.cos(rx),s1=Math.sin(rx),c2=Math.cos(ry),s2=Math.sin(ry),c3=Math.cos(rz),s3=Math.sin(rz);let x1=x*c1-y*s1,y1=x*s1+y*c1;let z1=z*c2-w*s2,w1=z*s2+w*c2;let x2=x1*c3-z1*s3,z2=x1*s3+z1*c3;let sc=280/(w1+4);return{x:W/2+x2*sc*50,y:H/2-y1*sc*50,z:z2,w:w1};}
function draw(){
ctx.fillStyle='#010108';ctx.fillRect(0,0,W,H);if(auto){rx+=0.008;ry+=0.01;rz+=0.006;}
if(keys['ArrowLeft'])ry-=0.03;if(keys['ArrowRight'])ry+=0.03;if(keys['ArrowUp'])rx-=0.03;if(keys['ArrowDown'])rx+=0.03;if(keys[' '])auto=true;
const pts=v4.map(v=>proj(v));edges.forEach(([i,j])=>{const a=pts[i],b=pts[j];ctx.strokeStyle=`hsla(${(a.w+b.w)*40+200},100%,60%,${Math.max(0.15,Math.min(1,(a.w+b.w)/2+0.5))})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
pts.forEach(p=>{ctx.fillStyle=`rgba(255,255,255,${Math.max(0.2,Math.min(1,p.w/4+0.5))})`;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
gHudL.textContent='4D TESSERACT';gHudR.textContent='ARROWS | SPACE';
}
function loop(){draw();extLoopId=requestAnimationFrame(loop);}loop();
return ()=>{document.removeEventListener('keydown',onK);document.removeEventListener('keyup',onU);if(extLoopId)cancelAnimationFrame(extLoopId);};
}

// GAMES LIST
// ============================================================
const games=[
{title:'BLOCK BLAST',icon:'🧊',type:'puzzle',badge:'BLAST',desc:'Разрушайте блоки! Комбо, бонусы и уровни! Телефонная версия!',play:createBlockBlast},
{title:'FNF: NEON BEATS',icon:'🎤',type:'fnf',badge:'FNF',desc:'Ритм-игра с 6 уровнями. Сенсорное управление!',play:showFnfSelect},
{title:'4D TESSERACT',icon:'🌐',type:'action3d',badge:'3D',desc:'Вращающийся гиперкуб. Клавиатура или авто.',play:createTesseract},
];

function launchGame(game){
if(extCleanup){extCleanup();extCleanup=null;}
if(extLoopId)cancelAnimationFrame(extLoopId);
sfx.launch();showToast('LAUNCHING '+game.title);
extCleanup=game.play();
}

function renderGames(filter='all'){
gameGrid.innerHTML='';
const filtered=games.filter(g=>filter==='all'||g.type===filter||(filter==='blockblast'&&g.type==='puzzle')||(filter==='3d'&&g.type==='action3d'));
filtered.forEach(g=>{
const card=document.createElement('div');card.className='game-card';
card.innerHTML=`<div class="game-card-top"><span class="game-card-badge ${g.type==='action3d'?'action3d':g.type}">${g.badge}</span></div><div class="game-card-icon">${g.icon}</div><div class="game-card-title">${g.title}</div><div class="game-card-desc">${g.desc}</div><div class="game-card-footer"><button class="game-card-play">▶ PLAY</button></div>`;
card.querySelector('.game-card-play').addEventListener('click',e=>{e.stopPropagation();launchGame(g);});
card.addEventListener('click',()=>launchGame(g));gameGrid.appendChild(card);
});
}

function signIn(){if(!booted)return;sfx.select();loginScreen.classList.add('hidden');showToast('WELCOME, '+users[currentUser]);}
function selectUser(i){currentUser=i;document.querySelectorAll('.login-user-pill').forEach((el,j)=>el.classList.toggle('active',j===i));loginAvatar.textContent=userIcons[i];sfx.click();}
function updateMobileNav(){if(!isMobile())return;document.querySelectorAll('.mobile-nav-item').forEach((el,i)=>{el.classList.remove('active');if(i===0)el.classList.add('active');});}

function init(){
renderGames();createStars();updateMobileNav();
document.querySelectorAll('.login-user-pill').forEach(el=>el.addEventListener('click',()=>selectUser(parseInt(el.dataset.user))));
loginEnter.addEventListener('click',signIn);
loginScreen.addEventListener('click',e=>{if(e.target===loginScreen||e.target.classList.contains('login-bg')||e.target.classList.contains('login-stars'))signIn();});
document.querySelectorAll('.header-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.header-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');renderGames(tab.dataset.filter);sfx.click();});});
document.querySelectorAll('.sidebar-item').forEach((item,i)=>{item.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));item.classList.add('active');sfx.click();});});
document.querySelectorAll('.mobile-nav-item').forEach((item,i)=>{item.addEventListener('click',()=>{document.querySelectorAll('.mobile-nav-item').forEach(el=>el.classList.remove('active'));item.classList.add('active');sfx.click();});});
fnfBack.addEventListener('click',closeFnf);gameBack.addEventListener('click',closeGame);
document.addEventListener('keydown',e=>{
if(!booted)return;
if(!loginScreen.classList.contains('hidden')){if(e.key==='Enter'){e.preventDefault();signIn();}if(e.key==='ArrowLeft'||e.key==='ArrowRight'){e.preventDefault();selectUser((currentUser+(e.key==='ArrowRight'?1:-1)+3)%3);}return;}
if(fnfOverlay.classList.contains('active')&&e.key==='Escape'){e.preventDefault();closeFnf();}
if(gameOverlay.classList.contains('active')&&e.key==='Escape'){e.preventDefault();closeGame();}
});
document.body.addEventListener('click',()=>ac(),{once:true});document.body.addEventListener('touchstart',()=>ac(),{once:true});
setTimeout(()=>{bootScreen.classList.add('hidden');booted=true;showToast('NEON CORE v10 READY');},2500);
}
window.addEventListener('DOMContentLoaded',init);
window.addEventListener('resize',()=>{if(isMobile())updateMobileNav();});
})();
</script>
